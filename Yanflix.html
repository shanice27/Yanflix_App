<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Yanflix ” Private AI Dubbing Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810;
    --bg-1: #0d0d18;
    --bg-2: #131322;
    --bg-3: #1b1b2c;
    --line: #232336;
    --line-2: #2e2e44;
    --ink: #ece9e0;
    --ink-2: #b8b3a4;
    --ink-3: #6f6a5c;
    --crimson: #c8102e;
    --crimson-dim: #8a0a1f;
    --crimson-glow: rgba(200, 16, 46, 0.55);
    --red: #c8102e;
    --gold: #d4af37;
    --gold-dim: #8b7224;
    --good: #4ade80;
    --warn: #f59e0b;
    --info: #6aa9ff;
    --bad: #ef4444;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--ink); font-family: 'Outfit', sans-serif; -webkit-font-smoothing: antialiased; }
  body {
    background:
      radial-gradient(1100px 600px at 85% -10%, rgba(200,16,46,0.08), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(212,175,55,0.05), transparent 60%),
      var(--bg);
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #1f1f30; border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: #2a2a40; }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }

  .app {
    display: grid;
    grid-template-columns: 220px 1fr;
    height: 100vh;
    overflow: hidden;
  }
  .sidebar {
    background: linear-gradient(180deg, #0a0a14 0%, #07070e 100%);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    position: relative;
    height: 100vh;
    overflow: hidden;
  }
  .sidebar::after {
    content: ""; position: absolute; right: -1px; top: 0; bottom: 0; width: 1px;
    background: linear-gradient(180deg, transparent, rgba(200,16,46,0.35) 30%, rgba(212,175,55,0.2) 70%, transparent);
    pointer-events: none;
  }
  .logo {
    padding: 32px 22px 26px;
    border-bottom: 1px solid var(--line);
    position: relative;
    background:
      radial-gradient(160% 80% at 50% 120%, rgba(200,16,46,0.18), transparent 60%),
      linear-gradient(180deg, #050509, #0a0a14);
  }
  .logo h1 {
    font-family: 'Bebas Neue', serif;
    font-weight: 400;
    font-size: 44px;
    letter-spacing: 0.04em;
    margin: 0;
    line-height: 0.9;
    background: linear-gradient(180deg, #a00d22 0%, #6f0816 55%, #3d040c 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow:
      0 1px 0 rgba(0,0,0,0.6),
      0 2px 0 rgba(0,0,0,0.5),
      0 3px 6px rgba(200,16,46,0.4),
      0 0 24px rgba(200,16,46,0.25);
    filter: drop-shadow(0 4px 8px rgba(200,16,46,0.18));
  }
  .logo .tag {
    margin-top: 8px;
    font-size: 9.5px;
    letter-spacing: 0.34em;
    color: var(--ink-3);
    text-transform: uppercase;
    font-weight: 500;
  }
  .logo .bar {
    position: absolute; left: 22px; right: 22px; bottom: -1px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--crimson), transparent);
    opacity: 0.7;
  }
  .nav {
    padding: 16px 12px;
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 12px; margin-bottom: 4px;
    border-radius: 6px; cursor: pointer; color: var(--ink-2);
    font-size: 13.5px; letter-spacing: 0.04em; font-weight: 400;
    border: 1px solid transparent;
    transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
    position: relative;
  }
  .nav-item:hover { background: rgba(255,255,255,0.025); color: var(--ink); }
  .nav-item.active {
    background: linear-gradient(90deg, rgba(200,16,46,0.18), rgba(200,16,46,0.04) 80%);
    color: #fff;
    border-color: rgba(200,16,46,0.35);
  }
  .nav-item.active::before {
    content: ""; position: absolute; left: -12px; top: 8px; bottom: 8px; width: 2px;
    background: var(--crimson); box-shadow: 0 0 10px var(--crimson-glow);
  }
  .nav-item .ico { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.85; }
  .nav-item.active .ico { color: var(--gold); opacity: 1; }
  .sys {
    margin-top: auto;
    padding: 14px 18px;
    border-top: 1px solid var(--line);
    font-size: 10.5px; letter-spacing: 0.1em;
  }
  .sys-row { display: flex; justify-content: space-between; padding: 4px 0; color: var(--ink-3); text-transform: uppercase; }
  .sys-ok { color: var(--good); }
  .sys-bad { color: var(--bad); }
  .sys-warn { color: var(--warn); }
  .ws-row {
    margin-top: 8px; padding-top: 10px; border-top: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px; font-size: 10.5px;
    letter-spacing: 0.12em; color: var(--ink-3); text-transform: uppercase;
  }
  .ws-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--good);
    box-shadow: 0 0 8px var(--good), 0 0 0 3px rgba(74, 222, 128, 0.12);
    animation: pulse 2s ease-in-out infinite;
  }
  .ws-dot.bad { background: var(--bad); box-shadow: 0 0 8px var(--bad); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

  .main { overflow-y: auto; padding: 32px 44px 60px; position: relative; }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; gap: 24px; }
  .eyebrow { font-size: 11px; letter-spacing: 0.34em; color: var(--gold); text-transform: uppercase; font-weight: 500; margin-bottom: 8px; }
  .page-title { font-family: 'Bebas Neue', serif; font-size: 42px; font-weight: 400; letter-spacing: 0.04em; margin: 0; color: #fff; line-height: 1; }
  .page-sub { color: var(--ink-3); font-size: 13.5px; margin-top: 8px; max-width: 620px; line-height: 1.6; }
  .head-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .pill {
    padding: 6px 12px; border-radius: 999px; font-size: 11px; letter-spacing: 0.18em;
    text-transform: uppercase; border: 1px solid var(--line-2);
    color: var(--ink-2); background: rgba(255,255,255,0.02);
  }
  .pill.crimson { color: var(--crimson); border-color: rgba(200,16,46,0.4); background: rgba(200,16,46,0.08); }
  .pill.gold { color: var(--gold); border-color: rgba(212,175,55,0.4); background: rgba(212,175,55,0.08); }
  .pill.good { color: var(--good); border-color: rgba(74,222,128,0.4); background: rgba(74,222,128,0.08); }

  .btn {
    border: 1px solid var(--line-2); background: var(--bg-2); color: var(--ink);
    padding: 9px 16px; border-radius: 4px; font-size: 13px; letter-spacing: 0.06em;
    transition: all 160ms ease;
  }
  .btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn:disabled:hover { border-color: var(--line-2); color: var(--ink); }
  .btn-primary {
    background: linear-gradient(180deg, var(--crimson) 0%, var(--crimson-dim) 100%);
    border-color: var(--crimson);
    color: #fff;
    box-shadow: 0 6px 18px -8px var(--crimson-glow), inset 0 1px 0 rgba(255,255,255,0.12);
    text-transform: uppercase; letter-spacing: 0.14em; font-weight: 500;
  }
  .btn-primary:hover { box-shadow: 0 8px 22px -6px var(--crimson-glow), inset 0 1px 0 rgba(255,255,255,0.18); filter: brightness(1.08); color: #fff; border-color: var(--crimson); }
  .btn-primary:disabled { opacity: 0.4; filter: grayscale(0.6); cursor: not-allowed; }
  .btn-gold {
    background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dim) 100%);
    border-color: var(--gold); color: #1a1405;
    text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600;
  }
  .btn-gold:hover { filter: brightness(1.08); color: #1a1405; border-color: var(--gold); }
  .btn-ghost { background: transparent; border-color: var(--line-2); }
  .btn-danger { color: var(--crimson); border-color: rgba(200,16,46,0.4); }
  .btn-danger:hover { background: rgba(200,16,46,0.1); color: #fff; border-color: var(--crimson); }
  .btn-small { padding: 6px 12px; font-size: 11.5px; }

  .input, .select, .textarea {
    width: 100%; padding: 10px 12px; background: var(--bg-1);
    border: 1px solid var(--line); border-radius: 4px;
    color: var(--ink); font-size: 13px;
    transition: border-color 160ms ease, box-shadow 160ms ease;
  }
  .textarea { font-family: inherit; resize: vertical; min-height: 90px; line-height: 1.5; }
  .input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--crimson); box-shadow: 0 0 0 3px rgba(200,16,46,0.12); }
  .label { display: block; font-size: 10.5px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 8px; font-weight: 500; }
  .help { font-size: 11px; color: var(--ink-3); margin-top: 6px; line-height: 1.5; }
  .field { margin-bottom: 18px; }

  .panel {
    background: linear-gradient(180deg, var(--bg-1), var(--bg));
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 22px 24px;
    position: relative;
  }
  .panel-title { font-family: 'Bebas Neue', serif; font-size: 18px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); margin: 0 0 16px; font-weight: 400; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; }

  /* Sub-tabs (studio) */
  .subtabs {
    display: flex; gap: 2px; border-bottom: 1px solid var(--line);
    margin-bottom: 24px; overflow-x: auto;
  }
  .subtab {
    background: transparent; border: 0; color: var(--ink-3);
    padding: 12px 16px; font-size: 12.5px; letter-spacing: 0.06em;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    white-space: nowrap; transition: all 160ms ease;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .subtab:hover { color: var(--ink); }
  .subtab.on { color: #fff; border-bottom-color: var(--crimson); }
  .subtab .step {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1px solid currentColor; display: inline-flex;
    align-items: center; justify-content: center; font-size: 10px; font-weight: 600;
    transition: all 160ms ease;
  }
  .subtab.done .step { background: var(--good); border-color: var(--good); color: #06120a; }
  .subtab.on.done .step { background: var(--good); border-color: var(--good); }

  /* Drop zone */
  .dropzone {
    position: relative;
    border: 1.5px dashed var(--line-2);
    border-radius: 6px;
    padding: 56px 28px;
    text-align: center;
    transition: border-color 200ms ease, background 200ms ease, box-shadow 200ms ease;
    background:
      radial-gradient(400px 200px at 50% 50%, rgba(200,16,46,0.04), transparent 70%),
      var(--bg-1);
    cursor: pointer;
  }
  .dropzone:hover, .dropzone.over {
    border-color: var(--crimson);
    box-shadow: inset 0 0 60px rgba(200,16,46,0.12), 0 0 0 1px rgba(200,16,46,0.4);
  }
  .dropzone .glyph {
    width: 56px; height: 56px; margin: 0 auto 14px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--line-2);
    border-radius: 50%; color: var(--gold);
    background: var(--bg-2);
  }
  .dropzone:hover .glyph { border-color: var(--crimson); color: var(--crimson); }
  .dropzone .heading { font-family: 'Bebas Neue', serif; font-size: 22px; letter-spacing: 0.1em; color: #fff; margin-bottom: 4px; }
  .dropzone .sub { color: var(--ink-3); font-size: 12px; letter-spacing: 0.04em; }

  /* Stat */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat {
    background: var(--bg-1); border: 1px solid var(--line);
    border-radius: 4px; padding: 14px 16px;
  }
  .stat-label { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 6px; }
  .stat-value { font-family: 'Bebas Neue', serif; font-size: 28px; color: #fff; line-height: 1; letter-spacing: 0.02em; }
  .stat-value.gold { color: var(--gold); }
  .stat-value.crimson { color: var(--crimson); }
  .stat-value.good { color: var(--good); }

  /* Pipeline stages */
  .stages { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
  .stage-card {
    background: var(--bg-1); border: 1px solid var(--line); border-radius: 4px;
    padding: 14px 16px; position: relative; overflow: hidden;
  }
  .stage-card.run { border-color: var(--crimson); box-shadow: 0 0 0 1px rgba(200,16,46,0.4), inset 0 0 30px rgba(200,16,46,0.05); }
  .stage-card.done { border-color: rgba(74,222,128,0.4); }
  .stage-card.idle { opacity: 0.6; }
  .stage-num { font-size: 9.5px; letter-spacing: 0.22em; color: var(--ink-3); text-transform: uppercase; }
  .stage-name { font-family: 'Bebas Neue', serif; font-size: 16px; letter-spacing: 0.06em; color: #fff; margin-top: 2px; }
  .stage-desc { font-size: 10.5px; color: var(--ink-3); margin-top: 6px; line-height: 1.5; min-height: 28px; }
  .stage-bar { margin-top: 10px; height: 3px; background: var(--bg-3); border-radius: 99px; overflow: hidden; }
  .stage-bar-fill { height: 100%; background: linear-gradient(90deg, var(--crimson), var(--gold)); border-radius: 99px; transition: width 400ms ease; position: relative; }
  .stage-bar-fill::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: shimmer 1.6s infinite linear; }
  .stage-card.done .stage-bar-fill { background: var(--good); }
  .stage-card.done .stage-bar-fill::after { display: none; }
  .stage-card.idle .stage-bar-fill::after { display: none; }
  @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600;
    border: 1px solid currentColor;
  }
  .badge::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .badge.queued { color: var(--info); background: rgba(106,169,255,0.08); }
  .badge.running { color: var(--crimson); background: rgba(200,16,46,0.1); }
  .badge.done { color: var(--good); background: rgba(74,222,128,0.08); }
  .badge.scheduled { color: var(--gold); background: rgba(212,175,55,0.08); }
  .badge.failed { color: var(--bad); background: rgba(239,68,68,0.08); }
  .badge.pending { color: var(--ink-3); background: rgba(255,255,255,0.03); }

  /* Cast row */
  .cast-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .cast-row {
    background: var(--bg-1); border: 1px solid var(--line);
    border-radius: 4px; padding: 12px 14px;
    display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: center;
  }
  .spk-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--gold); letter-spacing: 0.06em;
    border: 1px solid rgba(212,175,55,0.3);
    padding: 5px 9px; border-radius: 3px; background: rgba(212,175,55,0.05);
  }
  .mini-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, var(--crimson-dim), var(--crimson));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', serif; font-size: 13px; color: #fff;
    box-shadow: 0 0 0 1px var(--bg), 0 0 0 2px var(--gold-dim);
  }
  .mini-wave {
    height: 18px; display: flex; align-items: center; gap: 2px;
  }
  .mini-wave span {
    width: 2px; background: var(--gold-dim); border-radius: 99px;
    animation: bounce 1.4s ease-in-out infinite;
  }
  .mini-wave span:nth-child(1) { animation-delay: 0s; height: 30%; }
  .mini-wave span:nth-child(2) { animation-delay: 0.1s; height: 60%; }
  .mini-wave span:nth-child(3) { animation-delay: 0.2s; height: 90%; }
  .mini-wave span:nth-child(4) { animation-delay: 0.3s; height: 60%; }
  .mini-wave span:nth-child(5) { animation-delay: 0.4s; height: 40%; }
  @keyframes bounce { 0%, 100% { transform: scaleY(0.5); } 50% { transform: scaleY(1); } }

  /* Library */
  .lib-card {
    background: var(--bg-1); border: 1px solid var(--line);
    border-radius: 6px; overflow: hidden; cursor: pointer;
    transition: transform 200ms ease, border-color 200ms ease, box-shadow 200ms ease;
  }
  .lib-card:hover {
    transform: translateY(-3px);
    border-color: var(--crimson);
    box-shadow: 0 12px 32px -16px var(--crimson-glow), 0 0 0 1px rgba(200,16,46,0.4);
  }
  .lib-thumb {
    aspect-ratio: 16/9;
    background: repeating-linear-gradient(45deg, #15151f 0 8px, #181826 8px 16px);
    position: relative; border-bottom: 1px solid var(--line);
    background-size: cover; background-position: center;
  }
  .lib-thumb.has-img::after { display: none; }
  .lib-thumb.has-img { background-repeat: no-repeat; }
  .lib-thumb.has-img::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, transparent 30%, transparent 65%, rgba(0,0,0,0.65) 100%);
  }
  .lib-thumb::after {
    content: attr(data-letter); position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', serif; font-size: 80px; color: rgba(212,175,55,0.18);
  }
  .play-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 200ms ease;
  }
  .lib-card:hover .play-overlay { opacity: 1; }
  .play-icon {
    width: 56px; height: 56px; border-radius: 50%; background: var(--crimson);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 28px var(--crimson-glow);
  }
  .lib-meta { padding: 14px 16px; }
  .lib-title { font-size: 14px; font-weight: 500; color: #fff; margin-bottom: 4px; line-height: 1.3; }
  .lib-sub { font-size: 11px; color: var(--ink-3); letter-spacing: 0.06em; font-family: 'JetBrains Mono', monospace; display: flex; gap: 10px; }
  .lib-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
  .lib-tag {
    font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 2px;
    background: rgba(212,175,55,0.08); color: var(--gold);
    border: 1px solid rgba(212,175,55,0.25);
    transition: all 140ms ease;
  }
  .lib-tag:hover { background: rgba(200,16,46,0.15); color: #fff; border-color: var(--crimson); }
  .thumb-tags { position: absolute; top: 10px; left: 10px; display: flex; gap: 5px; z-index: 2; }
  .thumb-tag {
    font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 600;
    padding: 3px 7px; border-radius: 2px;
    background: rgba(8,8,16,0.78); color: #fff;
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(4px);
  }
  .lib-card-actions {
    position: absolute; top: 10px; right: 10px; display: flex; gap: 6px;
    opacity: 0; transition: opacity 200ms ease; z-index: 3;
  }
  .lib-card:hover .lib-card-actions { opacity: 1; }
  .icon-btn {
    width: 30px; height: 30px; border-radius: 4px;
    background: rgba(8,8,16,0.85); border: 1px solid rgba(255,255,255,0.1);
    color: #fff; display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .icon-btn:hover { background: var(--crimson); border-color: var(--crimson); }

  /* Thumbnail editor modal */
  .thumb-modal-card {
    width: min(560px, 92vw);
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 24px;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.7);
  }
  .thumb-preview {
    aspect-ratio: 16/9; border-radius: 4px;
    background: repeating-linear-gradient(45deg, #15151f 0 8px, #181826 8px 16px);
    background-size: cover; background-position: center;
    border: 1px solid var(--line);
    position: relative; overflow: hidden;
    margin-bottom: 16px;
  }
  .thumb-preview .placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;

/* Animated waveform bar component ” static when idle, animates when playing */
const WAVE_HEIGHTS = [30,55,80,65,45,90,50,35,70,85,40,60,95,45,75,55,30,80,65,50,85,40,70,55,90,35,60,80,45,70,55,35,80,60,45,85,50,65];
function AnimWaveform({ active, seed = 0, barCount = 38 }) {
  const heights = React.useMemo(() =>
    Array.from({ length: barCount }, (_, k) =>
      20 + Math.abs(Math.sin(k * 0.6 + seed * 1.3)) * 75
    ), [barCount, seed]);
  return (
    <div className={`stem-wave${active ? ' active' : ''}`}>
      {heights.map((h, k) => {
        const delay = ((k * 0.07 + seed * 0.13) % 1).toFixed(3);
        const dur   = (0.55 + ((k * 37 + seed * 17) % 40) / 100).toFixed(2);
        return (
          <div
            key={k}
            className="stem-wave-bar"
            style={{
              height: h * 0.38 + 'px',
              transformOrigin: 'center',
              animation: active ? `waveBar ${dur}s ${delay}s ease-in-out infinite` : 'none',
              transform: active ? undefined : `scaleY(1)`,
            }}
          />
        );
      })}
    </div>
  );
}

    episodeName: episode ? episode.name : '',
    // source
    sourceMethod: 'upload', youtubeUrl: '',
    media: null, // {name, duration, size, tracks}
    mediaUrl: null,      // object URL for browser playback
    mediaExt: '.m4a',    // original file extension
    episodeFolder: '',   // filename stem, e.g. smoking_supermarket_s01e01
    // isolation
    isolated: false, isolating: false,
    vocalsUrl: null,     // object URL ” same as mediaUrl in UI prototype

}

function DubStudio({ job, setJob, updJob, characters, setCharacters, projects, setProjects, pushToast, sysCheck, config, refreshCharacters }) {
  const [sub, setSub] = useState('project');
  const upd = updJob;
  const [wf1Firing, setWf1Firing] = useState(false);
  const [wf2Firing, setWf2Firing] = useState(false);
  const [wf3Firing, setWf3Firing] = useState(false);

  const triggerWorkflow = async (webhookPath, payload, wfLabel, setFiring) => {
    setFiring(true);
    try {
      const res = await fetch(`http://localhost:5678/webhook/${webhookPath}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(`n8n responded ${res.status}`);
      pushToast({ kind: 'success', title: `${wfLabel} started`, msg: `Running for ${job.episodeLabel} — watch n8n at localhost:5678` });
    } catch (e) {
      pushToast({ kind: 'error', title: `${wfLabel} failed to start`, msg: e.message || 'Could not reach n8n — is Docker running?' });
    } finally {
      setFiring(false);
    }
  };

  const epFolder = slugify(job.episodeFolder || job.episodeName);
  const srcLang  = LANG_CODE[job.sourceLang] || 'ja';

  const launchWF1 = () => triggerWorkflow(
    'harvest-characters',
    { show_name: job.projectTitle, ep_folder: epFolder, source_lang: srcLang },
    'WF1: Voice Bank',
    setWf1Firing
  );

  const launchWF2 = () => {
    const rawFileName = job.media?.name || '';
    if (!rawFileName) {
      pushToast({ kind: 'error', title: 'Select a source file first', msg: 'Go to Source Media and pick or download a file before running WF2.' });
      return;
    }
    triggerWorkflow(
      'script-director',
      { show_name: job.projectTitle, episode_id: job.episodeLabel, ep_folder: epFolder, raw_file_name: rawFileName, source_lang: srcLang },
      'WF2: Script Director',
      setWf2Firing
    );
  };

  const launchWF3 = () => triggerWorkflow(
    'run-dub',
    { ep_folder: epFolder, track_modes: ['standard', 'aave'] },
    'WF3: Dub Pipeline',
    setWf3Firing
  );

  const dialogueSegs = job.segments.filter(isDialogue);
  const stageDone = {
    project: !!(job.projectId && job.episodeId),
    source: !!job.media,
    isolate: !!job.isolated,
    speakers: !!job.speakersDetected && job.detectedSpeakers.length > 0 && job.detectedSpeakers.every(d => job.assignments[d.id]),
    script: !!job.directed,
    voices: !!job.voicesDone,
    mixer: !!job.directed,
    export: !!job.exported,
  };

  const subtabs = [
    { id: 'project',  label: 'Project',        step: 1, key: 'project' },
    { id: 'source',   label: 'Source Media',   step: 2, key: 'source' },
    { id: 'isolate',  label: 'Vocal Isolation',step: 3, key: 'isolate' },
    { id: 'speakers', label: 'Speakers',       step: 4, key: 'speakers' },
    { id: 'script',   label: 'Script',         step: 5, key: 'script' },
    { id: 'voices',   label: 'Voices',         step: 6, key: 'voices' },
    { id: 'mixer',    label: 'Mixer',          step: 7, key: 'mixer' },
    { id: 'export',   label: 'Export',         step: 8, key: 'export' },

  return (
    <>
      <div className="page-head">
        <div>
          <div className="eyebrow">Workspace</div>
          <h2 className="page-title">Dub Studio</h2>
          <div className="page-sub">A resumable conveyor belt. Each stage locks its result to a checkpoint ” regenerate any single step without re-running the others. Low-RAM by design: nothing runs until you press its button.</div>
        </div>
        <div className="head-actions">
          {job.episodeLabel && <span className="pill gold">{job.projectTitle.split(' ').slice(0,3).join(' ')}… · {job.episodeLabel}</span>}
          <span className="pill crimson">IndexTTS-2</span>
          <div style={{ display: 'flex', gap: 6, alignItems: 'center', marginLeft: 8 }}>
            <button
              className="btn btn-small"
              style={{ fontSize: 11, padding: '4px 10px', borderColor: 'var(--gold)', color: 'var(--gold)' }}
              disabled={!job.projectId || wf1Firing}
              onClick={launchWF1}
              title="WF1: Build / refresh the character voice bank for this show (run once per show, not per episode)"
            >
              {wf1Firing ? '…' : '▶ WF1: Voice Bank'}
            </button>
            <button
              className="btn btn-small"
              style={{ fontSize: 11, padding: '4px 10px', borderColor: 'var(--gold)', color: 'var(--gold)' }}
              disabled={!(job.projectId && job.episodeId && job.media) || wf2Firing}
              onClick={launchWF2}
              title="WF2: Transcribe → diarize → cast review → clone speakers (first half of episode pipeline)"
            >
              {wf2Firing ? '…' : '▶ WF2: Script Director'}
            </button>
            <button
              className="btn btn-primary btn-small"
              style={{ fontSize: 11, padding: '4px 10px' }}
              disabled={!(job.projectId && job.episodeId) || wf3Firing}
              onClick={launchWF3}
              title="WF3: Translate → synthesize dialogue → time-stretch → render MP4s (second half of episode pipeline)"
            >
              {wf3Firing ? '…' : '▶ WF3: Dub Pipeline'}
            </button>
          </div>
        </div>
      </div>

      <div className="subtabs">
        {subtabs.map(t => (
          <button key={t.id} className={'subtab' + (sub === t.id ? ' on' : '') + (stageDone[t.key] ? ' done' : '')} onClick={() => setSub(t.id)}>
            <span className="step">{stageDone[t.key] ? <Ico.check width="11" height="11"/> : t.step}</span>{t.label}
          </button>
        ))}
      </div>

      {sub === 'project'  && <SubProject  job={job} setJob={setJob} upd={upd} projects={projects} setProjects={setProjects} pushToast={pushToast} go={setSub} />}
      {sub === 'source'   && <SubSource   job={job} upd={upd} pushToast={pushToast} go={setSub} />}
      {sub === 'isolate'  && <SubIsolate  job={job} upd={upd} pushToast={pushToast} go={setSub} />}
      {sub === 'speakers' && <SubSpeakers job={job} upd={upd} characters={characters} go={setSub} pushToast={pushToast} refreshCharacters={refreshCharacters} />}
      {sub === 'script'   && <SubScript   job={job} upd={upd} characters={characters} setCharacters={setCharacters} pushToast={pushToast} go={setSub} config={config} />}
      {sub === 'voices'   && <SubVoices   job={job} upd={upd} characters={characters} pushToast={pushToast} go={setSub} />}
      {sub === 'mixer'    && <SubMixer    job={job} upd={upd} go={setSub} />}
      {sub === 'export'   && <SubExport   job={job} upd={upd} setProjects={setProjects} pushToast={pushToast} stageDone={stageDone} />}
    </>
  );
}

function Stat({ label, value, cls }) {

    <div className="stat">

/* ---------- LockBar Helper Component ---------- */
// Define early so any stage can safely render <LockBar />.
function LockBar({ locked, lockedText, idleText, actionLabel, onAction, onContinue, continueLabel, regen, onRegen }) {
  return (
    <div className="lock-bar">
      <div className="lock-note">
        <span className={'dot' + (locked ? ' ok' : '')}></span>
        <span>{locked ? (lockedText || 'Stage locked') : (idleText || 'Pending action')}</span>
      </div>
      <div style={{ display: 'flex', gap: 8 }}>
        {actionLabel && onAction && (
          <button className="btn btn-primary btn-small" onClick={onAction} disabled={locked}>
            {actionLabel}
          </button>
        )}
        {regen && locked && onRegen && (
          <button className="btn btn-small" onClick={onRegen}>

/* Bottom-of-stage navigation: Back / status / Regenerate / Next */
function StageNav({ go, prev, next, nextLabel, status, locked, regen, onRegen, extra }) {

      <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
        {prev ? <button className="btn btn-small btn-ghost" onClick={() => go(prev)}>← Back</button> : <span></span>}

      </div>

      </div>

// ==========================
// Backend bridge (serve_ui.py)
// ==========================
function apiPost(path, body) {
  return fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body || {}),
  }).then(r => {
    if (!r.ok) return r.json().then(j => { throw new Error(j.error || ('HTTP ' + r.status)); });
    return r.json();
  });
}

function apiGet(path) {
  return fetch(path).then(r => {
    if (!r.ok) return r.json().then(j => { throw new Error(j.error || ('HTTP ' + r.status)); });
    return r.json();
  });
}


function startLogPolling() {
  const logBox = document.getElementById('log-console-box');
  if (!logBox) return;

  // Ensure only one poller runs
  if (window.__yanflix_log_timer) {
    clearInterval(window.__yanflix_log_timer);
  }

  window.__yanflix_log_timer = setInterval(() => {
    apiGet('/api/status')
      .then(status => {
        // Expected fields from serve_ui.py (currently simple), but we tolerate variations.
        const line = status?.latest_output
          ? `Status: ${status.latest_output} (output updated)`
          : (status?.current_log || status?.message || null);

        if (line) {
          const div = document.createElement('div');
          div.innerHTML = `<span style="color: var(--ink-3)">[${new Date().toLocaleTimeString()}]</span> ${String(line)}`;
          logBox.appendChild(div);
          logBox.scrollTop = logBox.scrollHeight;
        }
      })
      .catch(() => {
        // ignore polling errors to avoid killing UI
      });
  }, 1000);
}


/* ---------- Stage 1: Project ---------- */
function SubProject({ job, setJob, upd, projects, setProjects, pushToast, go }) {
  const [creating, setCreating] = useState(false);
  const [title, setTitle] = useState('');
  const [format, setFormat] = useState('Series');
  const [genre, setGenre] = useState('');
  const [year, setYear] = useState('');
  const [epCount, setEpCount] = useState(1);
  const csvRef = useRef(null);

  const activeProject = projects.find(p => p.id === job.projectId);

  const selectEpisode = (proj, ep) => {
    if (ep.status === 'complete') {
      pushToast({ kind: 'info', title: 'Already dubbed', msg: `${ep.label} is complete ” open it in the Library.` });
      return;
    }
    if (ep.id === job.episodeId) return;
    setJob(freshJob(proj, ep));
    pushToast({ kind: 'success', title: 'Episode selected', msg: `${proj.title} · ${ep.label}` });
  };

  const createProject = () => {
    if (!title.trim()) { pushToast({ kind: 'error', title: 'Title required' }); return; }
    const slug = slugify(title);
    const episodes = format === 'Movie'
      ? [{ id: 'm_' + Date.now(), label: 'MOVIE', name: title.trim(), status: 'empty' }]
      : Array.from({ length: Math.max(1, epCount) }).map((_, i) => ({
          id: `ep_${Date.now()}_${i}`, label: `S01E${String(i + 1).padStart(2, '0')}`, name: `Episode ${i + 1}`, status: 'empty',
        }));
    const proj = { id: 'p_' + Date.now(), title: title.trim(), format, genres: genre ? genre.split(',').map(g => g.trim()).filter(Boolean) : [], year, slug, thumb: null, episodes };
    setProjects(p => [proj, ...p]);
    setJob(freshJob(proj, episodes[0]));
    pushToast({ kind: 'success', title: 'Project created', msg: `${title} · ${episodes.length} episode${episodes.length>1?'s':''} pre-created` });
    setCreating(false); setTitle(''); setGenre(''); setYear(''); setEpCount(1);
  };

  const importCsv = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const rows = ev.target.result.split(/\r?\n/).filter(r => r.trim());
        const header = rows[0].split(',').map(h => h.trim().toLowerCase());
        const body = rows.slice(1).map(r => {
          // naive CSV split honoring quotes
          const cells = r.match(/("([^"]|"")*"|[^,]*)(,|$)/g).slice(0, header.length).map(c => c.replace(/,$/,'').replace(/^"|"$/g,'').trim());
          return Object.fromEntries(header.map((h, i) => [h, cells[i] || '']));
        });
        if (!body.length) throw new Error('no rows');
        const title = body[0].title || file.name.replace(/\.csv$/,'');
        const slug = slugify(title);
        const episodes = body.map((r, i) => ({
          id: `csv_${Date.now()}_${i}`, label: `S01E${String(i + 1).padStart(2, '0')}`,
          name: r.episode_name || `Episode ${i + 1}`, status: 'empty',
        }));
        const genres = (body[0].genres || '').split(/[;,]/).map(g => g.trim()).filter(Boolean);
        const proj = { id: 'p_' + Date.now(), title, format: body[0].format || 'Series', genres, year: body[0].release_year || '', slug, thumb: null, episodes };
        setProjects(p => [proj, ...p]);
        pushToast({ kind: 'success', title: 'CSV imported', msg: `${title} · ${episodes.length} episodes, cast roster saved to characters/shows/${slug}/` });
      } catch {
        pushToast({ kind: 'error', title: 'CSV import failed', msg: 'Expected columns: title, format, genres, release_year, episode_name, cast' });
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  return (
    <>
      <div className="panel" style={{ marginBottom: 20 }}>
        <div className="stage-head">
          <div className="panel-title">Projects &amp; Episodes</div>
          <div style={{ display: 'flex', gap: 8 }}>
            <input ref={csvRef} type="file" accept=".csv" hidden onChange={importCsv} />
            <button className="btn btn-small" onClick={() => csvRef.current?.click()}><Ico.doc width="13" height="13" style={{ marginRight: 6, verticalAlign: -2 }}/>Import Show CSV</button>
            <button className="btn btn-primary btn-small" onClick={() => setCreating(c => !c)}><Ico.plus width="13" height="13" style={{ marginRight: 6, verticalAlign: -2 }}/>New Project</button>
          </div>
        </div>
        <div className="help" style={{ marginTop: -6, marginBottom: 16 }}>Pre-create episodes before you dub. Pick an episode to load it into the pipeline ” its checkpoints live in <code style={{color:'var(--gold)',fontFamily:'JetBrains Mono, monospace'}}>jobs/{job.slug || 'show'}_&lt;ep&gt;/</code>.</div>

        {creating && (
          <div style={{ background: 'var(--bg-1)', border: '1px solid var(--line-2)', borderRadius: 6, padding: 18, marginBottom: 18 }}>
            <div style={{ display: 'flex', gap: 14, marginBottom: 14 }}>
              <div style={{ flex: 2 }}><div className="label">Title</div><input className="input" value={title} onChange={(e) => setTitle(e.target.value)} placeholder="e.g. Smoking Behind the Supermarket With You" /></div>
              <div style={{ flex: 1 }}><div className="label">Format</div><select className="select" value={format} onChange={(e) => setFormat(e.target.value)}><option>Series</option><option>Movie</option></select></div>
            </div>
            <div style={{ display: 'flex', gap: 14, marginBottom: 16 }}>
              <div style={{ flex: 2 }}><div className="label">Genres (comma separated)</div><input className="input" value={genre} onChange={(e) => setGenre(e.target.value)} placeholder="Slice of Life, Romance" /></div>
              <div style={{ flex: 1 }}><div className="label">Year</div><input className="input" value={year} onChange={(e) => setYear(e.target.value)} placeholder="2023" /></div>
              {format === 'Series' && <div style={{ flex: 1 }}><div className="label"># Episodes</div><input className="input" type="number" min="1" max="50" value={epCount} onChange={(e) => setEpCount(+e.target.value)} /></div>}
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn btn-primary btn-small" onClick={createProject}>Create &amp; Pre-Create Episodes</button>
              <button className="btn btn-ghost btn-small" onClick={() => setCreating(false)}>Cancel</button>
            </div>
          </div>
        )}

        <div className="proj-grid">
          {projects.map(p => (
            <button key={p.id} className={'proj-card' + (p.id === job.projectId ? ' active' : '')} onClick={() => selectEpisode(p, p.episodes.find(e => e.status !== 'complete') || p.episodes[0])}>
              <div className="proj-poster" style={p.thumb ? { backgroundImage: `url(${p.thumb})` } : null}>
                {!p.thumb && <span className="glyph-letter">{p.title[0]}</span>}
              </div>
              <div className="proj-body">
                <div className="proj-name">{p.title}</div>
                <div className="proj-meta">{p.format} · {p.episodes.length} ep · {p.episodes.filter(e => e.status==='complete').length} dubbed</div>
              </div>
            </button>
          ))}
        </div>
      </div>

      {activeProject && (
        <div className="panel">
          <div className="stage-head">
            <div className="panel-title">{activeProject.title} ” Episodes</div>
            <span className="pill">{activeProject.year || '”'} · {activeProject.genres.join(', ') || 'No genres'}</span>
          </div>
          <div className="ep-strip">
            {activeProject.episodes.map(ep => (
              <div key={ep.id} className={'ep-row' + (ep.id === job.episodeId ? ' active' : '')}>
                <span className="ep-tag">{ep.label}</span>
                <div><div className="ep-title">{ep.name}</div></div>
                <span className={'badge ' + (ep.status === 'complete' ? 'done' : ep.id === job.episodeId ? 'running' : 'pending')}>
                  {ep.status === 'complete' ? 'Dubbed' : ep.id === job.episodeId ? 'In Studio' : 'Not started'}
                </span>
                <button className="btn btn-small" onClick={() => selectEpisode(activeProject, ep)} disabled={ep.status === 'complete'}>
                  {ep.id === job.episodeId ? 'Loaded' : ep.status === 'complete' ? 'Done' : 'Load'}
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      <StageNav go={go} next="source" nextLabel="Next: Source Media →"
        status={job.episodeId ? `Episode loaded · ${job.episodeLabel}` : 'Pick or create an episode to begin'}
        locked={!!job.episodeId} />
    </>
  );
}

/* ---------- Stage 2: Source Media ---------- */
function SubSource({ job, upd, pushToast, go }) {
  const [over, setOver] = useState(false);
  const inputRef = useRef(null);

  const loadAudio = async (files) => {
    const f = files?.[0]; if (!f) return;
    const url = URL.createObjectURL(f);
    const ext = f.name.match(/\.[^.]+$/)?.[0] || '.m4a';
    const stem = slugify(f.name.replace(/\.[^.]+$/, ''));
    upd({
      sourceMethod: 'upload',
      media: { name: f.name, duration: '”', size: (f.size/1_000_000).toFixed(1) + ' MB', tracks: 1 },
      mediaUrl: url, mediaExt: ext, episodeFolder: stem,
    });
    pushToast({ kind: 'info', title: 'Uploading…', msg: `Saving ${f.name} to workspace/1_inputs/` });
    try {
      const form = new FormData();
      form.append('file', f);
      const res = await fetch('/api/upload-source', { method: 'POST', body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || res.status);
      pushToast({ kind: 'success', title: 'File saved', msg: `workspace/1_inputs/${f.name}` });
    } catch (e) {
      pushToast({ kind: 'error', title: 'Upload failed', msg: String(e?.message || e) });
    }
  };

  const fetchUrl = () => {
    const url = (job.youtubeUrl || '').trim();
    if (!url) { pushToast({ kind: 'error', title: 'Paste a link first' }); return; }
    upd({ sourceMethod: 'url' });
    pushToast({ kind: 'info', title: 'yt-dlp queued', msg: 'Downloading to workspace/0_raw_videos/…' });
    fetch('/api/ytdlp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, slug: job.slug || 'video' }),
    })
      .then(r => r.json())
      .then(res => {
        if (res.error) { pushToast({ kind: 'error', title: 'yt-dlp failed', msg: res.error }); return; }
        upd({ media: { name: res.filename, duration: res.duration || '?', size: res.size || '?', tracks: 2 } });
        pushToast({ kind: 'success', title: 'Raw video saved', msg: 'Detach audio in Clipchamp, then drop the clean track below.' });
      })
      .catch(e => pushToast({ kind: 'error', title: 'yt-dlp error', msg: String(e) }));
  };

  if (!job.episodeId) return <NeedEpisode go={go} />;

  return (
    <>
      <div className="panel" style={{ marginBottom: 20 }}>
        <div className="stage-head">
          <div className="panel-title">Source Media</div>
          {job.media && <span className="badge done">Loaded</span>}
        </div>

        <div className="media-opts">
          <div className="media-opt">
            <div className="tag-letter">A</div>
            <h4>Pull Raw Video (yt-dlp)</h4>
            <div className="desc">Download the full episode to <code style={{color:'var(--gold)',fontFamily:'JetBrains Mono,monospace',fontSize:10}}>workspace/0_raw_videos/</code> so you can detach audio in Clipchamp.</div>
            <div style={{ display: 'flex', gap: 8 }}>
              <input className="input" value={job.youtubeUrl} onChange={(e) => upd({ youtubeUrl: e.target.value })} placeholder="YouTube / Tubi / streaming link" />
              <button className="btn btn-primary btn-small" style={{ whiteSpace: 'nowrap' }} onClick={fetchUrl}><Ico.link width="13" height="13" style={{ marginRight: 6, verticalAlign: -2 }}/>Fetch</button>
            </div>
          </div>

          <div className="media-opt">
            <div className="tag-letter">B</div>
            <h4>Upload Source File</h4>
            <div className="desc">Drop your raw video or detached audio straight in. Accepts video (.mp4, .mkv) or audio (.wav, .mp3, .m4a).</div>
            <div className={'dropzone' + (over ? ' over' : '')} style={{ padding: '24px' }}
              onDragOver={(e) => { e.preventDefault(); setOver(true); }}
              onDragLeave={() => setOver(false)}
              onDrop={(e) => { e.preventDefault(); setOver(false); loadAudio(e.dataTransfer.files); }}
              onClick={() => inputRef.current?.click()}>
              <input ref={inputRef} type="file" accept="audio/*,video/*" hidden onChange={(e) => loadAudio(e.target.files)} />
              <div className="glyph"><Ico.upload width="18" height="18"/></div>
              <div className="heading" style={{ fontSize: 15 }}>Drop video or audio</div>
              <div className="sub">.mp4 · .mkv · .wav · .mp3 · .m4a</div>
            </div>
          </div>
        </div>

        <div className="clip-note">
          <Ico.scissors width="16" height="16" style={{ color: 'var(--gold)', flexShrink: 0, marginTop: 1 }}/>
          <div><b>Clipchamp hand-off:</b> Option A gives you the raw video. Detach the audio externally in Clipchamp, then return and use Option B to bring the clean track back into the workspace. Keeping detach manual avoids loading the full video into RAM.</div>
        </div>
      </div>

      {job.media && (
        <div className="panel">
          <div className="panel-title">Loaded Track</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 10, marginBottom: 8 }}>
            <Stat label="Filename" value={<span style={{ fontSize: 13, fontFamily: 'JetBrains Mono, monospace' }}>{job.media.name}</span>} />
            <Stat label="Duration" value={job.media.duration} />
            <Stat label="Size" value={job.media.size} />
            <Stat label="Audio Tracks" value={job.media.tracks} />
          </div>
        </div>
      )}

      <StageNav go={go} prev="project" next="isolate" nextLabel="Next: Vocal Isolation →"
        status={job.media ? `Source locked · workspace/1_inputs/${job.media.name}` : 'Load a track to continue'}
        locked={!!job.media}
        regen={!!job.media} onRegen={() => { upd({ media: null }); pushToast({ kind: 'info', title: 'Source cleared' }); }} />
    </>
  );
}

      <div style={{ fontSize: 13, color: 'var(--ink-3)', marginBottom: 16 }}>Pick or create one in the Project stage first.</div>

}

/* ---------- Stage 3: Vocal Isolation (Demucs) ---------- */
function SubIsolate({ job, upd, pushToast, go }) {
  const [prog, setProg] = useState(0);
  const [previewStem, setPreviewStem] = useState(null); // 'vocals' | 'bg' | null
  const audioRef = useRef(null);

  const togglePreview = (stem) => {
    if (previewStem === stem) {
      audioRef.current?.pause();
      setPreviewStem(null);
    } else {
      if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
      const url = stem === 'vocals' ? job.vocalsUrl : job.bgUrl;
      if (url) {
        const a = new Audio(url);
        a.loop = true;
        a.play().catch(() => {});
        audioRef.current = a;
      }
      setPreviewStem(stem);
    }
  };

  useEffect(() => () => { audioRef.current?.pause(); }, []);

  const epFolder  = job.episodeFolder || slugify(job.episodeName);

  // On mount: if stems already exist on disk (prior run), restore URLs without re-running
  useEffect(() => {
    if (!epFolder || job.isolated || job.isolating) return;
    apiGet(`/api/isolate_status?ep_folder=${encodeURIComponent(epFolder)}`)
      .then(res => {
        if (res.status === 'done') {
          upd({ isolated: true, vocalsUrl: '/' + res.vocals, bgUrl: '/' + res.background });
          setProg(100);
        }
      })
      .catch(() => {});
  }, [epFolder]); // eslint-disable-line
  const vocalsPath = `workspace/2_isolated/${epFolder}/htdemucs/${epFolder}/vocals.wav`;
  const bgPath     = `workspace/2_isolated/${epFolder}/htdemucs/${epFolder}/no_vocals.wav`;

  const separate = () => {
    if (!job.media) { pushToast({ kind: 'error', title: 'Load source media first' }); return; }
    if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
    setPreviewStem(null);
    upd({ isolating: true, isolated: false, vocalsUrl: null, bgUrl: null });
    setProg(0);
    const regen = job.isolated;
    pushToast({ kind: 'info', title: regen ? 'Regenerating ” Demucs overwriting stems' : 'Demucs started', msg: 'htdemucs --two-stems=vocals' });

    apiPost('/api/isolate', {
      audio:     `workspace/1_inputs/${job.media.name}`,
      ep_folder: epFolder,
    }).catch(e => {
      upd({ isolating: false });
      pushToast({ kind: 'error', title: 'Backend error', msg: String(e?.message || e) });
    });
  };

  useEffect(() => {
    if (!job.isolating) return;
    // Animate progress bar while polling real backend status
    const progTimer = setInterval(() => {
      setProg(p => Math.min(p + 1.5 + Math.random() * 2, 92)); // stall at 92 until done
    }, 400);
    const pollTimer = setInterval(() => {
      apiGet(`/api/isolate_status?ep_folder=${encodeURIComponent(epFolder)}`)
        .then(res => {
          if (res.status === 'done') {
            clearInterval(progTimer);
            clearInterval(pollTimer);
            setProg(100);
            upd({ isolating: false, isolated: true, vocalsUrl: '/' + res.vocals, bgUrl: '/' + res.background });
            pushToast({ kind: 'success', title: 'Stems separated', msg: `${epFolder}/vocals/  +  ${epFolder}/background/` });
          } else if (res.status === 'error') {
            clearInterval(progTimer);
            clearInterval(pollTimer);
            upd({ isolating: false });
            pushToast({ kind: 'error', title: 'Demucs failed', msg: res.error || 'Check terminal for details' });
          }
        })
        .catch(() => {}); // backend not ready yet, keep polling
    }, 2000);
    return () => { clearInterval(progTimer); clearInterval(pollTimer); };
  }, [job.isolating]); // eslint-disable-line

  if (!job.episodeId) return <NeedEpisode go={go} />;
  if (!job.media) return (
    <div className="empty" style={{ padding: '48px 0' }}>
      <div style={{ fontSize: 32, marginBottom: 12 }}>🎚️</div>
      <div style={{ fontSize: 15, color: 'var(--ink-2)', marginBottom: 6 }}>No source audio yet.</div>
      <div style={{ fontSize: 13, color: 'var(--ink-3)', marginBottom: 16 }}>Load a track in the Source Media stage.</div>
      <button className="btn btn-primary btn-small" onClick={() => go('source')}>← Go to Source Media</button>
    </div>
  );

  return (
    <div className="panel">
      <div className="stage-head">
        <div className="panel-title">Stage 1 · Vocal Isolation</div>
        {job.isolated ? <span className="badge done">Separated</span> : job.isolating ? <span className="badge running">Running</span> : <span className="badge pending">Pending</span>}
      </div>
      <div className="help" style={{ marginTop: -6, marginBottom: 16 }}>Run Demucs to split the dialogue from music &amp; SFX. The background stem (<code style={{color:'var(--gold)',fontFamily:'JetBrains Mono,monospace'}}>no_vocals.wav</code>) is reused at the Mixer stage so your dub sits over the original score.</div>

      <div className="stem-row" style={{ borderColor: 'var(--line-2)' }}>
        <div style={{ width: 26, height: 26, borderRadius: '50%', background: 'var(--bg-2)', border: '1px solid var(--line-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--gold)' }}>
          <Ico.mic width="14" height="14"/>
        </div>
        <div>
          <div className="stem-name">Original Audio</div>
          <div className="stem-path">workspace/1_inputs/{job.media.name}</div>
        </div>
        <span className="pill">{job.media.duration}</span>
      </div>

      {job.isolating && (
        <div style={{ margin: '16px 0' }}>
          <div className="stage-bar" style={{ height: 5 }}><div className="stage-bar-fill" style={{ width: prog + '%' }}></div></div>
          <div className="help" style={{ marginTop: 8 }}>Separating tracks… {Math.round(prog)}%</div>
        </div>
      )}

      {job.isolated && (
        <div style={{ marginTop: 14 }}>
          {[
            { stem: 'vocals', label: 'vocals.wav',     path: vocalsPath, seed: 3, title: 'Preview isolated dialogue' },
            { stem: 'bg',     label: 'no_vocals.wav', path: bgPath,     seed: 7, title: 'Preview music + SFX' },
          ].map(({ stem, label, path, seed, title }) => (
            <div key={stem} className="stem-row">
              <div className="stem-check"><Ico.check width="15" height="15"/></div>
              <div style={{ flex: 1 }}>
                <div className="stem-name">{label}</div>
                <div className="stem-path">{path}</div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <button onClick={() => togglePreview(stem)} title={previewStem === stem ? 'Stop' : title} style={{ background: previewStem === stem ? 'var(--crimson)' : 'var(--bg-2)', border: '1px solid var(--line-2)', borderRadius: 4, width: 28, height: 28, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', color: previewStem === stem ? '#fff' : 'var(--ink-2)', flexShrink: 0 }}>
                  {previewStem === stem
                    ? <svg width="11" height="11" viewBox="0 0 12 12" fill="currentColor"><rect x="1" y="1" width="4" height="10"/><rect x="7" y="1" width="4" height="10"/></svg>
                    : <svg width="11" height="11" viewBox="0 0 12 12" fill="currentColor"><polygon points="2,1 11,6 2,11"/></svg>}
                </button>
                <AnimWaveform active={previewStem === stem} seed={seed} barCount={38} />
              </div>
            </div>
          ))}
        </div>
      )}

      <LockBar
        locked={job.isolated}
        lockedText={`Stems locked · workspace/2_isolated/${epFolder}/`}
        idleText="Demucs has not run yet"
        actionLabel={job.isolating ? 'Separating…' : job.isolated ? 'Regenerate (overwrite)' : 'Separate Vocals'}
        onAction={separate}
        onContinue={() => go('speakers')} continueLabel="Continue to Speakers →"
        regen onRegen={separate}
      />
    </div>
  );
}

/* ---------- Stage 4: Speakers ---------- */
function SubSpeakers({ job, upd, characters, go, pushToast, refreshCharacters }) {
  const [playingSample, setPlayingSample] = useState(null);
  const sampleAudioRef = useRef(null);

  if (!job.episodeId) return <NeedEpisode go={go} />;
  if (!job.isolated)  return (
    <div className="empty" style={{ padding: '48px 0' }}>
      <div style={{ fontSize: 32, marginBottom: 12 }}>🎙️</div>
      <div style={{ fontSize: 15, color: 'var(--ink-2)', marginBottom: 6 }}>Vocals not isolated yet.</div>
      <div style={{ fontSize: 13, color: 'var(--ink-3)', marginBottom: 16 }}>Run Demucs in Vocal Isolation first.</div>
      <button className="btn btn-primary btn-small" onClick={() => go('isolate')}>← Go to Vocal Isolation</button>
    </div>
  );

  const epFolder   = job.episodeFolder || slugify(job.episodeName);
  const vocalsPath = `workspace/2_isolated/${epFolder}/htdemucs/${epFolder}/vocals.wav`;
  const setAssign  = (id, charId) => { upd({ assignments: { ...job.assignments, [id]: charId } }); setCastSaved(false); };

  // Pre-fill from previously detected count so re-runs are accurate by default
  const [numSpk, setNumSpk] = useState(job.numSpeakers || 0);
  const [minSpk, setMinSpk] = useState(0);
  const [maxSpk, setMaxSpk] = useState(0);
  const [mergeThresh, setMergeThresh] = useState(0.82);

  const runDiarize = () => {
    upd({ diarizing: true, speakersDetected: false, detectedSpeakers: [], speakerSamples: {}, assignments: {}, numSpeakers: 0 }); setCastSaved(false);
    pushToast({ kind: 'info', title: 'pyannote started', msg: `Analysing ${epFolder}/vocals.wav…` });
    apiPost('/api/diarize', { vocals: vocalsPath, ep_folder: epFolder, num_speakers: numSpk, min_speakers: minSpk, max_speakers: maxSpk, merge_threshold: mergeThresh })
      .catch(e => { upd({ diarizing: false }); pushToast({ kind: 'error', title: 'Backend error', msg: String(e?.message || e) }); });
  };

  // Poll while diarizing
  useEffect(() => {
    if (!job.diarizing) return;
    const t = setInterval(() => {
      apiGet(`/api/diarize_status?ep_folder=${encodeURIComponent(epFolder)}`)
        .then(res => {
          if (res.status === 'done') {
            clearInterval(t);
            const assignments = {};
            res.speakers.forEach((id, i) => { assignments[id] = characters[i % characters.length]?.id || ''; });
            upd({ diarizing: false, speakersDetected: true, detectedSpeakers: res.speakers, speakerSamples: res.samples, numSpeakers: res.speakers.length, assignments });
            pushToast({ kind: 'success', title: `${res.speakers.length} speaker(s) detected`, msg: res.speakers.join('  ·  ') });
          } else if (res.status === 'error') {
            clearInterval(t);
            upd({ diarizing: false });
            pushToast({ kind: 'error', title: 'Diarization failed', msg: res.error || 'Check terminal' });
          }
        }).catch(() => {});
    }, 2500);
    return () => clearInterval(t);
  }, [job.diarizing]); // eslint-disable-line

  // On mount: restore speakers + saved cast mapping
  useEffect(() => {
    if (!epFolder || job.speakersDetected || job.diarizing) return;
    // Load diarize result and saved cast mapping in parallel, prefer saved names
    Promise.all([
      apiGet(`/api/diarize_status?ep_folder=${encodeURIComponent(epFolder)}`).catch(() => null),
      apiGet(`/api/cast_mapping?ep_folder=${encodeURIComponent(epFolder)}`).catch(() => null),
    ]).then(([diar, cast]) => {
      if (!diar || diar.status !== 'done') return;
      const savedAssignments = cast?.assignments || {};
      const assignments = {};
      diar.speakers.forEach((id, i) => {
        assignments[id] = savedAssignments[id] || job.assignments[id] || characters[i % characters.length]?.id || '';
      });
      upd({
        speakersDetected: true,
        detectedSpeakers: diar.speakers,
        speakerSamples: diar.samples,
        numSpeakers: diar.speakers.length,
        assignments,
        ...(cast?.source_lang ? { sourceLang: cast.source_lang } : {}),
      });
    }).catch(() => {});
  }, [epFolder]); // eslint-disable-line

  const toggleSample = (spkId) => {
    if (playingSample === spkId) {
      sampleAudioRef.current?.pause(); setPlayingSample(null); return;
    }
    sampleAudioRef.current?.pause();
    const info = job.speakerSamples[spkId];
    if (info?.sample) {
      const a = new Audio('/' + info.sample);
      a.play().catch(() => {});
      sampleAudioRef.current = a;
      a.onended = () => setPlayingSample(null);
    }
    setPlayingSample(spkId);
  };

  useEffect(() => () => sampleAudioRef.current?.pause(), []);

  const [castSaved, setCastSaved] = useState(false);
  // Mark saved if cast_mapping.json already existed when we restored
  useEffect(() => {
    if (!epFolder) return;
    apiGet(`/api/cast_mapping?ep_folder=${encodeURIComponent(epFolder)}`).then(res => {
      if (res?.assignments) setCastSaved(true);
    }).catch(() => {});
  }, [epFolder]); // eslint-disable-line
  const [sourceLang, setSourceLang] = useState(job.sourceLang || 'Japanese');
  const [speakerNames, setSpeakerNames] = useState({});   // spkId -> custom name
  const [vaultSaved, setVaultSaved] = useState({});       // spkId -> 'saving'|'done'|'error'
  const unmerged    = job.detectedSpeakers.filter(id => !job.speakerMerges?.[id]);
  // Song speakers don't need a character assigned ” exclude them from the requirement
  const needsAssign = unmerged.filter(id => !job.songSpeakers?.[id]);
  const allAssigned = needsAssign.length > 0 && needsAssign.every(id => job.assignments[id]);
  const allMapped   = allAssigned && castSaved;

  const saveToVault = (spkId) => {
    const name = (speakerNames[spkId] || '').trim();
    if (!name) return;
    setVaultSaved(v => ({ ...v, [spkId]: 'saving' }));
    fetch('/api/save_speaker_to_vault', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ spk_id: spkId, name, show_slug: job.slug, ep_folder: epFolder }),
    })
      .then(r => r.json())
      .then(r => {
        if (r.ok) {
          setVaultSaved(v => ({ ...v, [spkId]: 'done' }));
          refreshCharacters();
        } else {
          setVaultSaved(v => ({ ...v, [spkId]: 'error' }));
        }
      })
      .catch(() => setVaultSaved(v => ({ ...v, [spkId]: 'error' })));
  };

  return (
    <>
      {/* â”€â”€ Detection panel â”€â”€ */}
      <div className="panel" style={{ marginBottom: 20 }}>
        <div className="stage-head">
          <div className="panel-title">Stage 1 · Speaker Detection</div>
          {job.speakersDetected
            ? <span className="badge done">{job.detectedSpeakers.length} Speakers Found</span>
            : job.diarizing
            ? <span className="badge running">Running…</span>
            : <span className="badge pending">Pending</span>}
        </div>
        <div className="help" style={{ marginTop: -6, marginBottom: 16 }}>
          pyannote diarizes <code style={{color:'var(--gold)',fontFamily:'JetBrains Mono,monospace'}}>{vocalsPath}</code> and extracts a voice sample per speaker so you can hear who's who before assigning characters.
        </div>

        {job.diarizing && (
          <div style={{ marginBottom: 14 }}>
            <div className="stage-bar" style={{ height: 4 }}><div className="stage-bar-fill" style={{ width: '100%', animation: 'indeterminate 1.4s ease-in-out infinite' }}></div></div>
            <div className="help" style={{ marginTop: 6 }}>pyannote is analysing the vocal track ” this usually takes 1‘3 minutes…</div>
          </div>
        )}

        {job.speakersDetected && (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(240px, 1fr))', gap: 10, marginBottom: 14 }}>
            {job.detectedSpeakers.map(spkId => {
              const info    = job.speakerSamples[spkId] || {};
              const playing = playingSample === spkId;
              const mergedInto = job.speakerMerges?.[spkId];
              const samplePath = info.sample ? `workspace/2_isolated/${epFolder}/speakers/${spkId}/sample.wav` : null;
              const spkIsSong = !!job.songSpeakers?.[spkId];
              const toggleSpkSong = () => {
                const next = !spkIsSong;
                const songSpeakers = { ...job.songSpeakers, [spkId]: next };
                // Also update segments if already loaded
                const segments = job.segments.length > 0
                  ? job.segments.map(s => s.speaker === spkId ? { ...s, isSong: next } : s)
                  : job.segments;
                upd({ songSpeakers, segments });
              };
              return (
                <div key={spkId} style={{ background: 'var(--bg-1)', border: `1px solid ${spkIsSong ? 'var(--gold)' : mergedInto ? 'rgba(234,179,8,0.4)' : playing ? 'var(--crimson)' : 'var(--line)'}`, borderRadius: 4, padding: 12, opacity: mergedInto ? 0.6 : 1 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                    <span className="spk-tag" style={{ background: mergedInto ? 'rgba(234,179,8,0.15)' : undefined }}>{spkId}</span>
                    {info.segment_count && <span style={{ fontSize: 10, color: 'var(--ink-3)' }}>{info.segment_count} segs</span>}
                    <button
                      onClick={toggleSpkSong}
                      title={spkIsSong ? 'All segments marked as song — click to unmark' : 'Mark all segments as song (skip TTS + translation)'}
                      style={{ fontSize: 10, padding: '1px 7px', borderRadius: 3, border: `1px solid ${spkIsSong ? 'var(--gold)' : 'var(--line-2)'}`, background: spkIsSong ? 'rgba(234,179,8,0.18)' : 'transparent', color: spkIsSong ? 'var(--gold)' : 'var(--ink-3)', cursor: 'pointer', whiteSpace: 'nowrap' }}
                    >♪ {spkIsSong ? 'Song ✓' : 'Song'}</button>
                    <button onClick={() => toggleSample(spkId)} title={playing ? 'Stop' : 'Play voice sample'} style={{ marginLeft: 'auto', background: playing ? 'var(--crimson)' : 'var(--bg-2)', border: '1px solid var(--line-2)', borderRadius: 4, width: 26, height: 26, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', color: playing ? '#fff' : 'var(--ink-2)' }}>
                      {playing
                        ? <svg width="10" height="10" viewBox="0 0 12 12" fill="currentColor"><rect x="1" y="1" width="4" height="10"/><rect x="7" y="1" width="4" height="10"/></svg>
                        : <svg width="10" height="10" viewBox="0 0 12 12" fill="currentColor"><polygon points="2,1 11,6 2,11"/></svg>}
                    </button>
                  </div>
                  <AnimWaveform active={playing} seed={spkId.charCodeAt(8) || 3} barCount={28} />
                  {/* Timestamp of the sample clip so user can find it in the video */}
                  {(info.sample_start != null) && (() => {
                    const fmt = s => { const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60); return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}` : `${m}:${String(sec).padStart(2,'0')}`; };
                    return (
                      <div style={{ marginTop: 5, display: 'flex', alignItems: 'center', gap: 6 }}>
                        <span style={{ fontSize: 9, color: 'var(--ink-3)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>sample clip</span>
                        <span style={{ fontSize: 11, color: 'var(--gold)', fontFamily: 'JetBrains Mono, monospace', fontWeight: 600 }}>
                          {fmt(info.sample_start)} → {fmt(info.sample_end)}
                        </span>
                      </div>
                    );
                  })()}
                  {samplePath && (
                    <div style={{ fontSize: 9.5, color: 'var(--ink-3)', fontFamily: 'JetBrains Mono, monospace', marginTop: 4, wordBreak: 'break-all' }}>{samplePath}</div>
                  )}
                  {/* Name + Save to Vault */}
                  <div style={{ marginTop: 8, display: 'flex', gap: 4 }}>
                    <input
                      className="input"
                      placeholder="Name (e.g. Zutomayo)"
                      value={speakerNames[spkId] || ''}
                      onChange={e => setSpeakerNames(n => ({ ...n, [spkId]: e.target.value }))}
                      style={{ flex: 1, fontSize: 11, padding: '3px 6px', height: 26 }}
                    />
                    <button
                      onClick={() => saveToVault(spkId)}
                      disabled={!speakerNames[spkId]?.trim() || vaultSaved[spkId] === 'saving'}
                      style={{ fontSize: 11, padding: '0 8px', height: 26, borderRadius: 4, border: '1px solid var(--line-2)', cursor: 'pointer',
                        background: vaultSaved[spkId] === 'done' ? 'rgba(34,197,94,0.15)' : vaultSaved[spkId] === 'error' ? 'rgba(239,68,68,0.15)' : 'var(--bg-2)',
                        color: vaultSaved[spkId] === 'done' ? '#4ade80' : vaultSaved[spkId] === 'error' ? '#f87171' : 'var(--ink-2)',
                        whiteSpace: 'nowrap' }}
                      title="Save this speaker's sample to Character Vault"
                    >
                      {vaultSaved[spkId] === 'saving' ? '…' : vaultSaved[spkId] === 'done' ? '✓ Saved' : vaultSaved[spkId] === 'error' ? '✗ Error' : '+ Vault'}
                    </button>
                  </div>
                  {/* Merge control */}
                  <div style={{ marginTop: 6 }}>
                    <select
                      className="select"
                      style={{ fontSize: 11, padding: '3px 6px', height: 26 }}
                      value={mergedInto || ''}
                      onChange={e => {
                        const val = e.target.value;
                        const merges = { ...(job.speakerMerges || {}) };
                        if (val) merges[spkId] = val; else delete merges[spkId];
                        upd({ speakerMerges: merges });
                      }}
                    >
                      <option value="">— keep separate —</option>
                      {job.detectedSpeakers.filter(s => s !== spkId).map(s => (
                        <option key={s} value={s}>same as {s}</option>
                      ))}
                    </select>
                    {mergedInto && <div style={{ fontSize: 10, color: 'var(--gold)', marginTop: 3 }}>merged → {mergedInto}</div>}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        <div style={{ display: 'flex', gap: 16, alignItems: 'center', flexWrap: 'wrap', marginBottom: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ fontSize: 11, color: 'var(--ink-3)', whiteSpace: 'nowrap' }}>Speakers (exact)</span>
            <input type="number" min="0" max="20" value={numSpk || ''} placeholder="auto"
              onChange={e => { setNumSpk(parseInt(e.target.value) || 0); setMinSpk(0); setMaxSpk(0); }}
              style={{ width: 64, fontFamily: 'JetBrains Mono, monospace', fontSize: 12 }}
              className="input" />
          </div>
          <div style={{ fontSize: 11, color: 'var(--ink-3)' }}>” or ”</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ fontSize: 11, color: 'var(--ink-3)' }}>Min</span>
            <input type="number" min="0" max="20" value={minSpk || ''} placeholder="”"
              onChange={e => { setMinSpk(parseInt(e.target.value) || 0); setNumSpk(0); }}
              style={{ width: 52, fontFamily: 'JetBrains Mono, monospace', fontSize: 12 }}
              className="input" />
            <span style={{ fontSize: 11, color: 'var(--ink-3)' }}>Max</span>
            <input type="number" min="0" max="20" value={maxSpk || ''} placeholder="”"
              onChange={e => { setMaxSpk(parseInt(e.target.value) || 0); setNumSpk(0); }}
              style={{ width: 52, fontFamily: 'JetBrains Mono, monospace', fontSize: 12 }}
              className="input" />
          </div>
          <div style={{ fontSize: 10, color: 'var(--ink-3)', fontStyle: 'italic' }}>
            {numSpk > 0 ? `pyannote will find exactly ${numSpk} speaker${numSpk > 1 ? 's' : ''}` : minSpk || maxSpk ? `pyannote will find ${minSpk||'?'}‘${maxSpk||'?'} speakers` : 'leaving blank lets pyannote guess (often wrong)'}
          </div>
        </div>

        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
          <span style={{ fontSize: 11, color: 'var(--ink-3)', whiteSpace: 'nowrap' }}>Auto-merge threshold</span>
          <input type="range" min="0" max="1" step="0.01" value={mergeThresh}
            onChange={e => setMergeThresh(parseFloat(e.target.value))}
            style={{ flex: 1, maxWidth: 180, accentColor: 'var(--gold)' }} />
          <span style={{ fontSize: 11, fontFamily: 'JetBrains Mono, monospace', color: 'var(--gold)', minWidth: 34 }}>
            {mergeThresh === 0 ? 'off' : mergeThresh.toFixed(2)}
          </span>
          <span style={{ fontSize: 10, color: 'var(--ink-3)', fontStyle: 'italic' }}>
            {mergeThresh === 0 ? 'no merging' : mergeThresh >= 0.9 ? 'very strict ” only near-identical voices merge' : mergeThresh >= 0.78 ? 'recommended ” collapses same-character emotional range' : 'aggressive ” may over-merge different characters'}
          </span>
        </div>

        <div style={{ display: 'flex', gap: 8 }}>
          <button className="btn btn-primary btn-small" onClick={runDiarize} disabled={job.diarizing}>
            {job.diarizing ? '⏳ Detecting…' : job.speakersDetected ? 'Re-run Detection' : 'â–¶ Detect Speakers'}
          </button>
        </div>
      </div>

      {/* â”€â”€ Assignment panel ” only shown once detection is done â”€â”€ */}
      {job.speakersDetected && (
        <div className="panel">
          <div className="panel-title">Stage 2 · Assign Voices</div>
          <div className="help" style={{ marginTop: -6, marginBottom: 16 }}>
            Map each detected speaker to a voice clone. The Actor resolves it via <code style={{color:'var(--gold)',fontFamily:'JetBrains Mono,monospace'}}>shows/{job.slug}/&lt;char&gt;/</code> then <code style={{color:'var(--gold)',fontFamily:'JetBrains Mono,monospace'}}>global_roster/&lt;char&gt;/</code>.
          </div>
          <div className="cast-grid">
            {job.detectedSpeakers.map(id => {
              const mergedInto = job.speakerMerges?.[id];
              if (mergedInto) {
                return (
                  <div key={id} className="cast-row" style={{ opacity: 0.5 }}>
                    <span className="spk-tag">{id}</span>
                    <span style={{ fontSize: 11, color: 'var(--gold)', fontStyle: 'italic' }}>merged → {mergedInto}</span>
                  </div>
                );
              }
              const charId = job.assignments[id] || '';
              const ch = characters.find(c => c.id === charId);
              return (
                <div key={id} className="cast-row">
                  <span className="spk-tag">{id}</span>
                  <select className="select" value={charId} onChange={(e) => setAssign(id, e.target.value)}>
                    <option value="">” unassigned ”</option>
                    <optgroup label="This Show">
                      {characters.filter(c => c.domain === 'show' && c.showSlug === job.slug).map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                    </optgroup>
                    <optgroup label="Global Roster">
                      {characters.filter(c => c.domain === 'global').map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                    </optgroup>
                  </select>
                  {ch && <div className="mini-avatar">{ch.name[0]}</div>}
                </div>
              );
            })}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10, flexWrap: 'wrap' }}>
            <span style={{ fontSize: 11, color: 'var(--ink-3)', whiteSpace: 'nowrap' }}>Source language</span>
            <select className="select" value={sourceLang} onChange={e => { setSourceLang(e.target.value); upd({ sourceLang: e.target.value }); setCastSaved(false); }} style={{ fontSize: 11, height: 26, padding: '0 6px' }}>
              {['Japanese','Spanish','Chinese (Mandarin)','Chinese (Cantonese)','Korean','French','Portuguese','Italian','German','Arabic','Hindi','Thai','Vietnamese','Indonesian','Russian','Turkish'].map(l => <option key={l}>{l}</option>)}
            </select>
            <span style={{ fontSize: 10, color: 'var(--ink-3)', fontStyle: 'italic' }}>Ollama will translate from this language → English</span>
          </div>
          <LockBar locked={allMapped} lockedText={`Cast mapping saved · ${sourceLang} → English`} idleText="Assign all unmerged speakers to continue"
            actionLabel={!allMapped && allAssigned ? "Save Cast Mapping" : null}
            onAction={allAssigned ? () => {
              const charIndex = {};
              characters.forEach(c => { charIndex[c.id] = { name: c.name, notes: c.notes || '' }; });
              fetch('/api/save_cast', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  ep_folder: epFolder,
                  show_name: job.projectTitle || job.slug || '',
                  source_lang: sourceLang,
                  assignments: job.assignments,
                  characters: charIndex,
                }),
              })
                .then(r => r.json())
                .then(r => { if (r.ok) { setCastSaved(true); upd({ sourceLang }); } })
                .catch(() => setCastSaved(true));
            } : null}
          />
        </div>
      )}

      {/* â”€â”€ Stage 3: Clone voices → Character Vault â”€â”€ */}
      {/* â”€â”€ Next → Script â”€â”€ always visible once speakers are detected â”€â”€ */}
      {job.speakersDetected && (
        <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 16 }}>
          <button className="btn btn-primary btn-small" onClick={() => go('script')}>
            Continue to Script →
          </button>
        </div>
      )}
    </>
  );
}

/* ---------- Stage 4 · Step 3: Clone Speakers → Character Vault ---------- */
function CloneSpeakersPanel({ job, upd, epFolder, pushToast, go, refreshCharacters }) {
  const [cloning, setCloning]   = useState(false);
  const [cloneRes, setCloneRes] = useState(null); // {done:[], total:N, results:{}}
  const pollRef = useRef(null);

  // Restore on mount if already cloned
  useEffect(() => {
    if (!epFolder) return;
    apiGet(`/api/clone_status?ep_folder=${encodeURIComponent(epFolder)}`)
      .then(res => { if (res.status === 'done') setCloneRes(res); })
      .catch(() => {});
  }, [epFolder]);

  const startClone = () => {
    // Only clone speakers that aren't merged away
    const toClone = {};
    job.detectedSpeakers.forEach(id => {
      if (!job.speakerMerges?.[id]) {
        toClone[id] = job.speakerSamples[id] || {};
      }
    });
    setCloning(true);
    setCloneRes(null);
    pushToast({ kind: 'info', title: 'IndexTTS cloning started', msg: `${Object.keys(toClone).length} speakers · American English` });

    apiPost('/api/clone_speakers', {
      speakers:  toClone,
      show_slug: job.slug,
      ep_folder: epFolder,
    }).catch(e => { setCloning(false); pushToast({ kind: 'error', title: 'Clone error', msg: String(e?.message || e) }); });

    pollRef.current = setInterval(() => {
      apiGet(`/api/clone_status?ep_folder=${encodeURIComponent(epFolder)}`)
        .then(res => {
          if (res.done) setCloneRes(res);
          if (res.status === 'done') {
            clearInterval(pollRef.current);
            setCloning(false);
            pushToast({ kind: 'success', title: `${res.done.length} voices cloned to Character Vault`, msg: 'Go back to Stage 2 to assign them, or continue to Script.' });
            if (refreshCharacters) refreshCharacters();
          }
        }).catch(() => {});
    }, 3000);
  };

  useEffect(() => () => clearInterval(pollRef.current), []);

  const speakers = job.detectedSpeakers.filter(id => !job.speakerMerges?.[id]);
  const done     = cloneRes?.done || [];
  const allDone  = cloneRes?.status === 'done';

  return (
    <div className="panel" style={{ marginTop: 20 }}>
      <div className="stage-head">
        <div className="panel-title">Stage 3 · Clone Voices → Character Vault</div>
        {allDone
          ? <span className="badge done">{done.length} Cloned</span>
          : cloning
          ? <span className="badge running">Cloning…</span>
          : <span className="badge pending">Pending</span>}
      </div>
      <div className="help" style={{ marginTop: -6, marginBottom: 16 }}>
        IndexTTS-2 clones each speaker's voice using their extracted sample as a reference. Output is American English ” the reference shapes timbre only, not accent. Clones are saved to <code style={{color:'var(--gold)',fontFamily:'JetBrains Mono,monospace'}}>characters/shows/{job.slug}/</code> so they appear in Character Vault and in the Stage 2 assignment dropdown.
      </div>

      {/* Per-speaker clone progress */}
      {(cloning || allDone) && (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(160px, 1fr))', gap: 8, marginBottom: 16 }}>
          {speakers.map(id => {
            const isDone = done.includes(id);
