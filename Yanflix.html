            const err    = cloneRes?.results?.[id]?.error;
            return (
              <div key={id} style={{ background: 'var(--bg-1)', border: `1px solid ${err ? 'var(--bad)' : isDone ? 'var(--good)' : 'var(--line)'}`, borderRadius: 4, padding: '8px 10px', display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ fontSize: 16 }}>{err ? '✗' : isDone ? '✓' : '⏳'}</span>
                <div>
                  <div style={{ fontSize: 11, fontFamily: 'JetBrains Mono, monospace', color: isDone ? 'var(--good)' : err ? 'var(--bad)' : 'var(--ink-2)' }}>{id}</div>
                  {err && <div style={{ fontSize: 10, color: 'var(--bad)', marginTop: 2 }}>{err}</div>}
                  {isDone && <div style={{ fontSize: 10, color: 'var(--ink-3)', marginTop: 2 }}>saved to vault</div>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
        <button className="btn btn-primary btn-small" onClick={startClone} disabled={cloning}>
          {cloning ? `⏳ Cloning… ${done.length}/${speakers.length}` : allDone ? 'Re-clone Voices' : 'â–¶ Clone Voices (American English)'}
        </button>
        {allDone && (
          <button className="btn btn-small" style={{ color: 'var(--gold)' }} onClick={() => go('script')}>
            Continue to Script →
          </button>
        )}
      </div>

      {allDone && (
        <div className="help" style={{ marginTop: 10 }}>
          Clones are now in the <strong style={{ color: 'var(--gold)' }}>Character Vault</strong> and in the Stage 2 dropdown. Go back up to Stage 2 to hear them and decide whether to use the show's own voices or swap in someone from your global roster.
        </div>
      )}
    </div>
  );
}

/* ---------- Stage 5: Script ---------- */
function SubScript({ job, upd, characters, setCharacters, pushToast, go, config }) {
  const [filter, setFilter] = useState('All');
  const [showRaw, setShowRaw] = useState(true);
  const [showEmotion, setShowEmotion] = useState(true);
  const [viewStyle, setViewStyle] = useState('standard'); // 'standard' | 'dialect'
  const [busy, setBusy] = useState(null); // 'transcribe' | 'translate' | 'direct'
  const importRef = useRef(null);

  const segs = job.segments;
  const speakerSet = useMemo(() => Array.from(new Set(segs.map(s => s.speaker))), [segs]);
  const filtered = filter === 'All' ? segs : segs.filter(s => s.speaker === filter);

  if (!job.episodeId) return <NeedEpisode go={go} />;

  // Restore cast mapping from disk if assignments are empty (e.g. after page refresh)
  const epFolderForCast = job.episodeFolder || slugify(job.episodeName || 'episode');
  useEffect(() => {
    if (Object.keys(job.assignments || {}).length > 0) return;
    fetch(`/api/cast_mapping?ep_folder=${encodeURIComponent(epFolderForCast)}`)
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (data?.assignments && Object.keys(data.assignments).length > 0) {
          upd({ assignments: data.assignments });
        }
      })
      .catch(() => {});
  }, [epFolderForCast]); // eslint-disable-line

  // Auto-restore segments + directed/translated flags from state_director.json on page refresh
  useEffect(() => {
    if (job.segments.length > 0) return; // already loaded
    fetch(`/api/checkpoint?ep_folder=${encodeURIComponent(epFolderForCast)}`)
      .then(r => r.ok ? r.json() : null)
      .then(segsData => {
        if (!Array.isArray(segsData) || segsData.length === 0) return;
        const songSpk = job.songSpeakers || {};
        const restored = segsData.map(s => songSpk[s.speaker] ? { ...s, isSong: true } : s);
        upd({
          segments: restored,
          transcribed: true,
          translated: segsData.some(s => s.translated_text),
          directed: segsData.some(s => s.emotion_line),
          directed_dialect: segsData.some(s => s.emotion_line_dialect),
          translated_dialect: segsData.some(s => s.translated_text_dialect),
        });
      })
      .catch(() => {});
  }, [epFolderForCast]); // eslint-disable-line

  const charForSpeaker = (sp) => characters.find(c => c.id === job.assignments?.[sp]);

  // Apply songSpeakers flags whenever segments change (e.g. after load/restore)
  const applySongSpeakers = (segsData) => {
    const ss = job.songSpeakers || {};
    if (Object.keys(ss).length === 0) return segsData;
    return segsData.map(s => ss[s.speaker] ? { ...s, isSong: true } : s);
  };

  const runStep = (step) => {

    if (step === 'transcribe' && !job.isolated) {
      pushToast({ kind: 'error', title: 'Isolate vocals first', msg: 'Whisper runs on vocals.wav' });
      return;
    }
    if ((step === 'translate' || step === 'translate_dialect') && !job.transcribed) {
      pushToast({ kind: 'error', title: 'Transcribe first' }); return;
    }
    if ((step === 'direct' || step === 'direct_dialect') && !job.translated) {
      pushToast({ kind: 'error', title: 'Run Standard Translate first' }); return;
    }

    setBusy(step);
    startLogPolling();

    const epFolder = job.episodeFolder || slugify(job.episodeName || 'episode');

    if (step === 'transcribe') {
      const payload = {
        ep_folder: epFolder,
        show_name: job.projectTitle || '',
        audio:     job.media?.name ? `workspace/1_inputs/${job.media.name}` : '',
        lang:      job.sourceLang ? LANG_CODE[job.sourceLang] || 'ja' : 'ja',
      };
      pushToast({ kind: 'info', title: 'Transcribing…', msg: 'Whisper + pyannote running' });
      apiPost('/api/transcribe', payload)
        .then(() => {
          const poll = setInterval(() => {
            apiGet(`/api/checkpoint?ep_folder=${encodeURIComponent(epFolder)}`).then(segsData => {
              if (!Array.isArray(segsData) || segsData.length === 0) return;
              clearInterval(poll);
              upd({ segments: applySongSpeakers(segsData), transcribed: true, translated: segsData.some(s => s.translated_text), directed: segsData.some(s => s.emotion_line) });
              setBusy(null);
              pushToast({ kind: 'success', title: 'Transcription done', msg: `${segsData.length} segments loaded` });
            }).catch(() => {});
          }, 1500);
        })
        .catch(e => { setBusy(null); pushToast({ kind: 'error', title: 'Transcribe error', msg: String(e?.message || e) }); });

    } else if (step === 'translate' || step === 'translate_dialect') {
      const style = step === 'translate_dialect' ? 'dialect' : 'standard';
      const styleLabel = style === 'dialect' ? 'AAVE Dialect' : 'Standard';
      pushToast({ kind: 'info', title: `Translating (${styleLabel})…`, msg: 'Ollama translating dialogue to English' });
      apiPost('/api/translate', { ep_folder: epFolder, show_name: job.projectTitle || '', style })
        .then(() => {
          const poll = setInterval(() => {
            apiGet(`/api/translate_status?ep_folder=${encodeURIComponent(epFolder)}&style=${style}`).then(res => {
              if (res.done !== undefined) pushToast({ kind: 'info', title: `Translating ${styleLabel}… ${res.done}/${res.total}` });
              if (res.status === 'done') {
                clearInterval(poll);
                apiGet(`/api/checkpoint?ep_folder=${encodeURIComponent(epFolder)}`).then(segsData => {
                  if (Array.isArray(segsData) && segsData.length) {
                    upd({
                      segments: applySongSpeakers(segsData),
                      translated: segsData.some(s => s.translated_text),
                      translated_dialect: segsData.some(s => s.translated_text_dialect),
                    });
                  }
                }).catch(() => {});
                setBusy(null);
                pushToast({ kind: 'success', title: `Translation (${styleLabel}) done` });
              } else if (res.status === 'error') {
                clearInterval(poll); setBusy(null);
                pushToast({ kind: 'error', title: `Translation (${styleLabel}) failed`, msg: res.error || '' });
              }
            }).catch(() => {});
          }, 2000);
        })
        .catch(e => { setBusy(null); pushToast({ kind: 'error', title: 'Translate error', msg: String(e?.message || e) }); });

    } else if (step === 'direct' || step === 'direct_dialect') {
      const style = step === 'direct_dialect' ? 'dialect' : 'standard';
      const styleLabel = style === 'dialect' ? 'AAVE Dialect' : 'Standard';
      pushToast({ kind: 'info', title: `Directing (${styleLabel})…`, msg: 'Ollama adding emotion tags' });
      apiPost('/api/direct', { ep_folder: epFolder, show_name: job.projectTitle || '', style })
        .then(() => {
          const poll = setInterval(() => {
            apiGet(`/api/direct_status?ep_folder=${encodeURIComponent(epFolder)}&style=${style}`).then(res => {
              if (res.status === 'done') {
                clearInterval(poll);
                apiGet(`/api/checkpoint?ep_folder=${encodeURIComponent(epFolder)}`).then(segsData => {
                  if (Array.isArray(segsData) && segsData.length) {
                    upd({
                      segments: applySongSpeakers(segsData),
                      directed: segsData.some(s => s.emotion_line),
                      directed_dialect: segsData.some(s => s.emotion_line_dialect),
                    });
                  }
                }).catch(() => {});
                setBusy(null);
                pushToast({ kind: 'success', title: `Direction (${styleLabel}) done` });
              } else if (res.status === 'error') {
                clearInterval(poll); setBusy(null);
                pushToast({ kind: 'error', title: `Direction (${styleLabel}) failed`, msg: res.error || '' });
              }
            }).catch(() => {});
          }, 2000);
        })
        .catch(e => { setBusy(null); pushToast({ kind: 'error', title: 'Direct error', msg: String(e?.message || e) }); });
    }
  };

  const importJSON = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const imported = Array.isArray(data) ? data : (data.segments || []);
        const hasEmo = imported.some(s => s.emotion_line);
        const hasTr = imported.some(s => s.translated_text);
        upd({ segments: imported, transcribed: true, translated: hasTr, directed: hasEmo });
        pushToast({ kind: 'success', title: 'Imported', msg: `${imported.length} segments from ${file.name}` });
      } catch { pushToast({ kind: 'error', title: 'Import failed', msg: 'Not valid JSON' }); }
    };
    reader.readAsText(file); e.target.value = '';
  };

  const saveJSON = () => {
    const epF = job.episodeFolder || slugify(job.episodeName);
    // Save to server so isSong flags and edits persist for the actor
    fetch('/api/save_segments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ep_folder: epF, segments: segs }),
    }).then(() => pushToast({ kind: 'success', title: 'Script saved', msg: 'state_director.json updated on server' }))
      .catch(() => pushToast({ kind: 'error', title: 'Save failed' }));
  };

  const epFolder   = job.episodeFolder || slugify(job.episodeName);
  const transcriptFolder = `jobs/${epFolder}`;
  const transcriptFile   = `jobs/${epFolder}/state_director.json`;

  const saveTranscript = () => {
    const detected = Array.from(new Set(segs.filter(isDialogue).map(s => s.speaker)));
    const doc = {
      show:    job.projectTitle,
      episode: job.episodeName,
      label:   job.episodeLabel,
      folder:  transcriptFolder,
      generated: new Date().toISOString(),
      speakers: detected.map(id => ({
        id,
        gender: SPEAKER_GENDER[id] || 'Unknown',
        assignedChar: job.assignments[id] || null,
      })),
      segments: segs,
    };
    const blob = new Blob([JSON.stringify(doc, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `${epFolder}_transcript.json`; a.click();
    upd({ transcriptReady: true });
    pushToast({ kind: 'success', title: 'Transcript saved', msg: transcriptFile });
  };

  const sendToVault = () => {
    const detected = Array.from(new Set(segs.filter(isDialogue).map(s => s.speaker)));
    let added = 0;
    setCharacters(prev => {
      const next = [...prev];
      detected.forEach(id => {
        if (next.find(c => c.id === id)) return;
        next.push({
          id, name: id,
          gender: SPEAKER_GENDER[id] || 'Unknown',
          domain: 'show', show: job.projectTitle, showSlug: job.slug,
          file: `characters/shows/${job.slug}/${id}/avatar_monologue.wav`,
          notes: `Auto-detected from ${job.episodeLabel}. Rename once voice is cloned.`,
          fav: false, usage: 0,
        });
        added++;
      });
      return next;
    });
    pushToast({ kind: 'success', title: `${added} speaker(s) sent to Character Vault`, msg: 'Rename & clone voices in the Vault tab.' });
  };

  const updateEmotion  = (id, val) => upd({ segments: segs.map(s => s.id === id ? { ...s, emotion_line: val } : s) });
  const updateSpeaker  = (id, val) => upd({ segments: segs.map(s => s.id === id ? { ...s, speaker: val } : s) });
  const toggleIsSong   = (id) => upd({ segments: segs.map(s => s.id === id ? { ...s, isSong: !s.isSong } : s) });
  // Use detected speakers so all options are available, not just those already in segments
  const allSpeakers    = (job.detectedSpeakers?.length ? job.detectedSpeakers : Array.from(new Set(segs.filter(s => !s.isSong).map(s => s.speaker)))).sort();

  return (
    <>
      <input ref={importRef} type="file" accept=".json" hidden onChange={importJSON} />
      <div className="panel" style={{ marginBottom: 20 }}>
        <div className="stage-head">
          <div className="panel-title">Transcript &amp; Script</div>
          <div style={{ display: 'flex', gap: 6 }}>
            {job.transcribed && <span className="badge done">Transcribed</span>}
            {job.translated && <span className="badge done">Standard</span>}
            {job.translated_dialect && <span className="badge done" style={{ background: 'rgba(212,175,55,0.18)', color: 'var(--gold)', border: '1px solid var(--gold)' }}>AAVE</span>}
            {job.directed && <span className="badge done">Directed</span>}
            {job.directed_dialect && <span className="badge done" style={{ background: 'rgba(212,175,55,0.18)', color: 'var(--gold)', border: '1px solid var(--gold)' }}>AAVE Directed</span>}
          </div>
        </div>
        <div id="log-console-box" className="log" style={{ marginBottom: 12 }}>
          <div style={{ color: 'var(--ink-3)' }}>Backend logs will appear here after you press â–¶ Transcribe.</div>
        </div>
        {epFolder && (
          <div style={{ background: 'var(--bg-1)', border: '1px solid var(--line)', borderRadius: 4, padding: '8px 12px', marginBottom: 10, display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
            <span style={{ fontSize: 10, color: 'var(--ink-3)', letterSpacing: '0.15em', textTransform: 'uppercase' }}>Output folder</span>
            <code style={{ fontSize: 11, color: 'var(--gold)', fontFamily: 'JetBrains Mono, monospace' }}>{transcriptFile}</code>
            {job.transcriptReady && <span className="badge done" style={{ marginLeft: 'auto' }}>Saved</span>}
          </div>
        )}
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
          <button className="btn btn-primary btn-small" onClick={() => runStep('transcribe')} disabled={!!busy}>{busy==='transcribe' ? '⏳ Transcribing…' : 'â–¶ Transcribe'}</button>

          <button className="btn btn-small" onClick={() => runStep('translate')} disabled={!!busy || !job.transcribed} title="Clean natural American English">{busy==='translate' ? '⏳ Standard…' : job.translated ? '✓ Standard' : 'Translate (Standard)'}</button>
          <button className="btn btn-small" onClick={() => runStep('translate_dialect')} disabled={!!busy || !job.transcribed} style={{ borderColor: 'var(--gold)', color: 'var(--gold)' }} title="Authentic AAVE dialect">{busy==='translate_dialect' ? '⏳ AAVE…' : job.translated_dialect ? '✓ AAVE' : 'Translate (AAVE)'}</button>
          <button className="btn btn-small" onClick={() => runStep('direct')} disabled={!!busy || !job.translated} title="Emotion tags for standard track">{busy==='direct' ? '⏳ Direct…' : job.directed ? '✓ Direct' : 'Direct (Standard)'}</button>
          <button className="btn btn-small" onClick={() => runStep('direct_dialect')} disabled={!!busy || !job.translated_dialect} style={{ borderColor: 'var(--gold)', color: 'var(--gold)' }} title="Emotion tags for AAVE track">{busy==='direct_dialect' ? '⏳ Direct AAVE…' : job.directed_dialect ? '✓ Direct AAVE' : 'Direct (AAVE)'}</button>
          <span style={{ width: 1, height: 22, background: 'var(--line)', margin: '0 2px' }}></span>
          <button className="btn btn-ghost btn-small" onClick={() => importRef.current?.click()}><Ico.upload width="13" height="13" style={{ marginRight: 5, verticalAlign: -2 }}/>Import JSON</button>
          {segs.length > 0 && <button className="btn btn-ghost btn-small" onClick={saveJSON}><Ico.download width="13" height="13" style={{ marginRight: 5, verticalAlign: -2 }}/>Save JSON</button>}
          {segs.length > 0 && <button className="btn btn-ghost btn-small" onClick={saveTranscript} title={`Saves to ${transcriptFile}`}><Ico.download width="13" height="13" style={{ marginRight: 5, verticalAlign: -2 }}/>Save Transcript</button>}
          {segs.length > 0 && <button className="btn btn-ghost btn-small" onClick={sendToVault} style={{ color: 'var(--gold)' }}>â†— Send Speakers to Vault</button>}
          <div style={{ flex: 1 }}></div>
          {segs.length > 0 && <>
            <select className="select" value={filter} onChange={(e) => setFilter(e.target.value)} style={{ width: 180 }}>
              <option value="All">All</option>
              {speakerSet.map(s => {
                const charId = job.assignments?.[s];
                const charName = charId ? characters.find(c => c.id === charId)?.name : null;
                return <option key={s} value={s}>{charName ? `${charName} (${s})` : s}</option>;
              })}
            </select>
            <label style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: 'var(--ink-2)' }}><div className={'toggle' + (showRaw ? ' on' : '')} onClick={() => setShowRaw(r => !r)}></div>Raw</label>
            <label style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: 'var(--ink-2)' }}><div className={'toggle' + (showEmotion ? ' on' : '')} onClick={() => setShowEmotion(r => !r)}></div>Emotion</label>
            {(job.translated_dialect) && (
              <div style={{ display: 'flex', gap: 4, marginLeft: 8, background: 'var(--surface-2)', borderRadius: 6, padding: '2px 4px' }}>
                <button className={`btn btn-small${viewStyle==='standard'?' btn-primary':''}`} style={{ padding: '2px 8px', fontSize: 11 }} onClick={() => setViewStyle('standard')}>Std</button>
                <button className={`btn btn-small${viewStyle==='dialect'?' btn-primary':''}`} style={{ padding: '2px 8px', fontSize: 11, ...(viewStyle!=='dialect'?{color:'var(--gold)',borderColor:'var(--gold)'}:{}) }} onClick={() => setViewStyle('dialect')}>AAVE</button>
              </div>
            )}
          </>}
        </div>
        {job.transcribed && (
          <div className="help" style={{ marginTop: 12 }}>
            Bad Ollama pass? Hit <strong style={{ color: 'var(--gold)' }}>Direct (Ollama)</strong> again ” vocals stay isolated and the translation stays put; only emotion tags + natural rewrite are regenerated.
          </div>
        )}
      </div>

      {segs.length === 0 ? (
        <div className="empty" style={{ padding: '48px 0' }}>
          <div style={{ fontSize: 32, marginBottom: 12 }}>🎙️</div>
          <div style={{ fontSize: 15, color: 'var(--ink-2)', marginBottom: 6 }}>No transcript yet.</div>
          <div style={{ fontSize: 13, color: 'var(--ink-3)' }}>Hit <strong style={{color:'var(--red)'}}>â–¶ Transcribe</strong> to run faster-whisper + pyannote, or import a saved <code>.json</code>.</div>
        </div>
      ) : (
        <>
          <div>
            {filtered.map(seg => {
              const ch = charForSpeaker(seg.speaker);
              return (
                <div key={seg.id} className="line" style={{ opacity: seg.isSong ? 0.45 : 1, borderLeft: seg.isSong ? '3px solid var(--gold)' : undefined }}>
                  <div className="line-head">
                    <div className="line-meta">
                      <span className="line-num">#{String(seg.id + 1).padStart(3, '0')}</span>
                      <button
                        onClick={() => toggleIsSong(seg.id)}
                        title={seg.isSong ? 'Marked as song ” click to unmark' : 'Mark as song (skip TTS)'}
                        style={{ fontSize: 11, padding: '1px 5px', borderRadius: 3, border: `1px solid ${seg.isSong ? 'var(--gold)' : 'var(--line-2)'}`, background: seg.isSong ? 'rgba(234,179,8,0.15)' : 'transparent', color: seg.isSong ? 'var(--gold)' : 'var(--ink-3)', cursor: 'pointer', flexShrink: 0 }}
                      >♪</button>
                      <select
                        value={seg.speaker}
                        onChange={(e) => updateSpeaker(seg.id, e.target.value)}
                        title="Override speaker for this line"
                        style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: 'var(--gold)', background: 'transparent', border: 'none', borderBottom: '1px dashed var(--gold-dim)', cursor: 'pointer', padding: '0 2px', outline: 'none', letterSpacing: '0.06em' }}
                      >
                        {allSpeakers.map(sp => <option key={sp} value={sp} style={{ background: 'var(--bg-1)', color: 'var(--ink-1)' }}>{sp}</option>)}
                      </select>
                      <span className="line-arr">→</span>
                      <span className="line-char">{seg.isSong ? <span style={{color:'var(--gold)'}}>♪ song ” skipped</span> : ch ? ch.name : <em style={{color:'var(--ink-3)'}}>unassigned</em>}</span>
                    </div>
                    <span className="line-time">{fmtTime(seg.start)} → {fmtTime(seg.end)}</span>
                  </div>
                  {showRaw && seg.text && <div className="line-row"><span className="lab">Raw</span><span className="line-text-raw">{seg.text}</span></div>}
                  {viewStyle === 'dialect'
                    ? seg.translated_text_dialect && <div className="line-row"><span className="lab" style={{ color: 'var(--gold)' }}>AAVE</span><span className="line-text-tr" style={{ color: 'var(--gold)' }}>{seg.translated_text_dialect}</span></div>
                    : seg.translated_text && <div className="line-row"><span className="lab">Trans</span><span className="line-text-tr">{seg.translated_text}</span></div>
                  }
                  {showEmotion && (viewStyle === 'dialect' ? job.directed_dialect : job.directed) && (
                    <div className="line-row" style={{ alignItems: 'flex-start' }}>
                      <span className="lab" style={{ marginTop: 10, ...(viewStyle==='dialect'?{color:'var(--gold)'}:{}) }}>Emotion</span>
                      <input className="input"
                        value={(viewStyle === 'dialect' ? seg.emotion_line_dialect : seg.emotion_line) || ''}
                        onChange={(e) => updateEmotion(seg.id, e.target.value)}
                        style={{ background: 'var(--bg-2)', ...(viewStyle==='dialect'?{borderColor:'var(--gold)'}:{}) }} />
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          {job.directed && (
            <div className="lock-bar">
              <div className="lock-note locked"><span className="dot"></span>Script locked · state_director.json</div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn btn-small" onClick={saveJSON}>Save Edited Script</button>
                <button className="btn btn-gold btn-small" onClick={() => go('voices')}>Continue to Voices →</button>
              </div>
            </div>
          )}
        </>
      )}
    </>
  );
}

/* ---------- Stage 6: Voices ---------- */
function SubVoices({ job, upd, characters, pushToast, go }) {
  const [genAll, setGenAll] = useState(false);
  const [genIdx, setGenIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [playing, setPlaying] = useState(null);
  const [dubStyle, setDubStyle] = useState('standard');

  if (!job.episodeId) return <NeedEpisode go={go} />;

  const segs = job.segments;
  const readyStandard = job.directed && segs.length > 0;
  const readyDialect  = job.directed_dialect && segs.length > 0;
  const ready = dubStyle === 'dialect' ? readyDialect : readyStandard;
  const doneCount = Object.values(job.lineDone).filter(Boolean).length;
  const audioDir  = dubStyle === 'dialect' ? 'tts_audio_dialect' : 'tts_audio';

  const generateAll = (style) => {
    if (style === 'dialect' && !readyDialect) { pushToast({ kind: 'error', title: 'Run Direct (AAVE) first' }); return; }
    if (style === 'standard' && !readyStandard) { pushToast({ kind: 'error', title: 'Run Direct (Standard) first' }); return; }
    const epFolder = job.episodeFolder || slugify(job.episodeName || 'episode');
    const label = style === 'dialect' ? 'AAVE Dialect' : 'Standard';
    setGenAll(true);
    pushToast({ kind: 'info', title: `IndexTTS-2 booting (${label})`, msg: `${segs.length} lines queued` });
    fetch('/api/actor', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ep_folder: epFolder, show_slug: job.slug, assignments: job.assignments, style }),
    })
      .then(r => r.json())
      .then(() => {
        const poll = setInterval(() => {
          fetch(`/api/actor_status?ep_folder=${encodeURIComponent(epFolder)}&style=${style}`)
            .then(r => r.json())
            .then(res => {
              if (res.done_lines) {
                const lineDone = {};
                res.done_lines.forEach(id => { lineDone[id] = true; });
                upd({ lineDone });
              }
              if (res.status === 'done') {
                clearInterval(poll);
                setGenAll(false);
                upd({ voicesDone: true });
                pushToast({ kind: 'success', title: `All voices generated (${label})`, msg: `${segs.length} lines → ${style === 'dialect' ? 'tts_audio_dialect' : 'tts_audio'}/` });
              } else if (res.status === 'error') {
                clearInterval(poll);
                setGenAll(false);
                pushToast({ kind: 'error', title: 'Actor failed', msg: res.error || '' });
              }
            }).catch(() => {});
        }, 4000);
      })
      .catch(e => { setGenAll(false); pushToast({ kind: 'error', title: 'Actor error', msg: String(e) }); });
  };

  const [regenning, setRegenning] = React.useState(null); // line id being regen'd
  const regenLine = (seg) => {
    if (!seg || regenning != null) return;
    const epFolder = job.episodeFolder || slugify(job.episodeName || 'episode');
    setRegenning(seg.id);
    fetch('/api/regen_line', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ep_folder: epFolder, line_id: seg.id, show_slug: job.slug, assignments: job.assignments, style: dubStyle }),
    }).then(() => {
      const poll = setInterval(() => {
        fetch(`/api/regen_line_status?ep_folder=${encodeURIComponent(epFolder)}&line_id=${seg.id}&style=${dubStyle}`)
          .then(r => r.json())
          .then(res => {
            if (res.status === 'done') {
              clearInterval(poll);
              setRegenning(null);
              upd({ lineDone: { ...job.lineDone, [seg.id]: true } });
              pushToast({ kind: 'success', title: 'Line regenerated', msg: `line_${String(seg.id).padStart(4,'0')}.wav` });
            } else if (res.status === 'error') {
              clearInterval(poll);
              setRegenning(null);
              pushToast({ kind: 'error', title: 'Regen failed', msg: res.error || 'Check terminal' });
            }
          }).catch(() => {});
      }, 1500);
    }).catch(e => { setRegenning(null); pushToast({ kind: 'error', title: 'Regen error', msg: String(e) }); });
  };

  const previewAudioRef = React.useRef(null);
  const previewLine = (seg) => {
    if (previewAudioRef.current) { previewAudioRef.current.pause(); previewAudioRef.current = null; }
    if (playing === seg.id) { setPlaying(null); return; }
    const epFolder = job.episodeFolder || slugify(job.episodeName || 'episode');
    const wavPath = `jobs/${epFolder}/${audioDir}/line_${String(seg.id).padStart(4,'0')}.wav`;
    const a = new Audio('/' + wavPath);
    previewAudioRef.current = a;
    setPlaying(seg.id);
    a.play().catch(() => pushToast({ kind: 'error', title: 'No audio yet', msg: 'Generate this line first' }));
    a.onended = () => setPlaying(null);
  };

  return (
    <div className="panel">
      <div className="stage-head">
        <div className="panel-title">Stage 3 · Actor (IndexTTS-2)</div>
        {job.voicesDone ? <span className="badge done">All lines</span> : <span className="badge pending">{doneCount}/{segs.length} lines</span>}
      </div>
      <div className="help" style={{ marginTop: -6, marginBottom: 16 }}>Each line is synthesized with the speaker's assigned reference voice. Generate everything, or fix just one line ” regenerating a single line never touches the rest.</div>

      <div style={{ display: 'flex', gap: 8, marginBottom: 12, flexWrap: 'wrap', alignItems: 'center' }}>
        <span style={{ fontSize: 11, color: 'var(--ink-3)' }}>Previewing:</span>
        <button className={`btn btn-small${dubStyle === 'standard' ? ' btn-primary' : ''}`} onClick={() => setDubStyle('standard')}>Standard</button>
        <button className={`btn btn-small${dubStyle === 'dialect' ? ' btn-primary' : ''}`} onClick={() => setDubStyle('dialect')} style={dubStyle !== 'dialect' ? { borderColor: 'var(--gold)', color: 'var(--gold)' } : {}}>AAVE Dialect</button>
      </div>
      <div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap' }}>
        <button className="btn btn-primary btn-small" onClick={() => generateAll('standard')} disabled={genAll || !readyStandard}>{genAll && dubStyle==='standard' ? `⏳ ${genIdx}/${segs.length}…` : 'â–¶ Generate Standard'}</button>
        <button className="btn btn-small" onClick={() => generateAll('dialect')} disabled={genAll || !readyDialect} style={{ borderColor: 'var(--gold)', color: 'var(--gold)' }}>{genAll && dubStyle==='dialect' ? `⏳ ${genIdx}/${segs.length}…` : 'â–¶ Generate AAVE'}</button>
        <button className="btn btn-small" onClick={() => selected != null && regenLine(segs.find(s => s.id === selected))} disabled={selected == null || regenning != null}>{regenning != null ? `⏳ Regen line_${String(regenning).padStart(4,'0')}…` : <><Ico.regen width="13" height="13" style={{ marginRight: 5, verticalAlign: -2 }}/>Regen Selected</>}</button>
        <button className="btn btn-small" onClick={() => selected != null && previewLine(segs.find(s => s.id === selected))} disabled={selected == null}><Ico.play width="12" height="12" style={{ marginRight: 5, verticalAlign: -1 }}/>Preview ({dubStyle === 'dialect' ? 'AAVE' : 'Std'})</button>
      </div>

      {genAll && <div style={{ marginBottom: 16 }}><div className="stage-bar" style={{ height: 5 }}><div className="stage-bar-fill" style={{ width: (genIdx/segs.length*100) + '%' }}></div></div></div>}

      {!ready ? (
        <div className="empty">Direct the script (Stage 5) before generating voices.</div>
      ) : segs.map(seg => {
        const ch = characters.find(c => c.id === job.assignments[seg.speaker]);
        const done = job.lineDone[seg.id];
        return (
          <div key={seg.id} className={'line' + (selected === seg.id ? ' sel' : '')} onClick={() => setSelected(seg.id)} style={{ cursor: 'pointer' }}>
            <div className="line-head">
              <div className="line-meta">
                <span className="line-num">#{String(seg.id + 1).padStart(3, '0')}</span>
                <span className="line-spk">{seg.speaker}</span>
                <span className="line-arr">→</span>
                <span className="line-char">{ch ? ch.name : '”'}</span>
              </div>
              <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                {done ? <span className="badge done" style={{ fontSize: 9 }}>line_{String(seg.id).padStart(4,'0')}.wav</span> : <span className="badge pending" style={{ fontSize: 9 }}>not generated</span>}
                <button className="icon-btn" style={{ width: 28, height: 28, background: 'var(--bg-2)' }} onClick={(e) => { e.stopPropagation(); previewLine(seg); }} disabled={!done} title="Preview"><Ico.play width="12" height="12"/></button>
                <button className="icon-btn" style={{ width: 28, height: 28, background: 'var(--bg-2)' }} onClick={(e) => { e.stopPropagation(); regenLine(seg); }} title="Regenerate this line"><Ico.regen width="13" height="13"/></button>
              </div>
            </div>
            <div className="line-row"><span className="lab">Line</span><span className="line-text-tr">{seg.emotion_line || seg.translated_text || seg.text}</span></div>
            {done && <div className={'wave-strip' + (playing === seg.id ? ' playing' : '')} style={{ marginTop: 8 }}>{waveHeights(seg.id + 2, 48).map((h,k)=><span key={k} style={{height:h+'%'}}></span>)}</div>}
          </div>
        );
      })}

      {ready && (
        <LockBar locked={job.voicesDone} lockedText="All lines rendered · tts_audio/" idleText={`${doneCount}/${segs.length} lines rendered`}
          onContinue={() => go('mixer')} continueLabel="Continue to Mixer →" />
      )}
    </div>
  );
}

/* ---------- Stage 7: Mixer ---------- */
function SubMixer({ job, upd, go }) {
  if (!job.episodeId) return <NeedEpisode go={go} />;
  return (
    <>
      <div className="grid-2" style={{ marginBottom: 20 }}>
        <div className="panel">
          <div className="panel-title">Audio Mix</div>
          <div className="field">
            <div className="label">Dub track volume <span style={{ color: 'var(--gold)', float: 'right', fontFamily: 'JetBrains Mono, monospace' }}>{job.dubVol.toFixed(2)}Ã—</span></div>
            <input type="range" className="slider" min="0.5" max="1.5" step="0.05" value={job.dubVol} onChange={(e) => upd({ dubVol: +e.target.value })} />
            <div className="help">Generated voice track in the final mix.</div>
          </div>
          <div className="field" style={{ marginBottom: 0 }}>
            <div className="label">Background (music + SFX) <span style={{ color: 'var(--gold)', float: 'right', fontFamily: 'JetBrains Mono, monospace' }}>{job.bgVol.toFixed(2)}Ã—</span></div>
            <input type="range" className="slider" min="0.3" max="1.2" step="0.05" value={job.bgVol} onChange={(e) => upd({ bgVol: +e.target.value })} />
            <div className="help">The Demucs <code style={{color:'var(--gold)',fontFamily:'JetBrains Mono,monospace'}}>no_vocals.wav</code> stem.</div>
          </div>
        </div>

        <div className="panel">
          <div className="panel-title">Lip-Sync / Time Stretch</div>
          <div className="field">
            <div className="label">Min stretch ratio <span style={{ color: 'var(--gold)', float: 'right', fontFamily: 'JetBrains Mono, monospace' }}>{job.stretchMin.toFixed(2)}</span></div>
            <input type="range" className="slider" min="0.5" max="1.0" step="0.05" value={job.stretchMin} onChange={(e) => upd({ stretchMin: +e.target.value })} />
          </div>
          <div className="field" style={{ marginBottom: 0 }}>
            <div className="label">Max compression ratio <span style={{ color: 'var(--gold)', float: 'right', fontFamily: 'JetBrains Mono, monospace' }}>{job.stretchMax.toFixed(2)}</span></div>
            <input type="range" className="slider" min="1.0" max="2.0" step="0.05" value={job.stretchMax} onChange={(e) => upd({ stretchMax: +e.target.value })} />
            <div className="help">Lines outside these limits play at natural TTS speed.</div>
          </div>
        </div>
      </div>

      <div className="panel">
        <div className="panel-title">Output Encoding</div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div>
            <div style={{ fontSize: 13, color: '#fff' }}>NVENC hardware encoding</div>
            <div className="help" style={{ marginTop: 2 }}>RTX 4050+ ” falls back to libx264 if absent.</div>
          </div>
          <div className={'toggle' + (job.nvenc ? ' on' : '')} onClick={() => upd({ nvenc: !job.nvenc })}></div>
        </div>
        <LockBar locked lockedText="Mix settings ready" onContinue={() => go('export')} continueLabel="Continue to Export →" />
      </div>
    </>
  );
}

/* ---------- Stage 8: Export ---------- */
function SubExport({ job, upd, setProjects, pushToast, stageDone }) {
  const [running, setRunning] = useState(false);
  const [stage, setStage] = useState(0);
  const [prog, setProg] = useState(0);
  const [logs, setLogs] = useState([]);

  if (!job.episodeId) return <div className="empty" style={{ padding: '48px 0' }}>Load an episode in the Project stage first.</div>;

  const checks = {
    'Source Media': stageDone.source,
    'Vocals Isolated': stageDone.isolate,
    'Cast Assigned': stageDone.speakers,
    'Script Directed': stageDone.script,
    'Voices Generated': stageDone.voices,
  };
  const allOk = Object.values(checks).every(Boolean);
  const now = () => new Date().toLocaleTimeString([], { hour12: false });

  const stages = [
    { name: 'Time-stretch', s: 4 },
    { name: 'Mix over no_vocals', s: 4 },
    { name: 'Encode (NVENC)', s: 4 },
    { name: 'Mux audio + video', s: 4 },
  ];

  const run = () => {
    if (!allOk) { pushToast({ kind: 'error', title: 'Finish earlier stages first' }); return; }
    setRunning(true); setStage(0); setProg(0); setLogs([{ t: now(), s: 4, msg: 'Starting sync + mux pipeline…' }]);
  };

  useEffect(() => {
    if (!running) return;
    const lines = [
      ['Loading 142 tts_audio clips…', 'Stretching to segment windows…', 'librosa time-stretch 0.6‘1.8Ã—'],
      ['Ducking background −' + Math.round((1-job.bgVol)*100) + '%…', 'Overlaying dub @ ' + job.dubVol.toFixed(2) + 'Ã—…', 'Normalizing −1 dBFS'],
      [job.nvenc ? 'h264_nvenc CQ 19…' : 'libx264 CRF 18…', 'GOP 2s, yuv420p'],
      ['Muxing AAC 192k…', 'Writing container…'],
    ];
    const t = setInterval(() => {
      setProg(p => {
        const n = p + 5 + Math.random() * 7;
        if (n >= 100) {
          setStage(s => {
            if (s >= 3) {
              clearInterval(t); setRunning(false);
              const path = `${job.outputPath || `${job.slug}_${job.episodeLabel}_dubbed.mp4`}`;
              const outPath = `workspace/5_outputs/${job.slug}_${job.episodeLabel}_dubbed.mp4`;
              upd({ exported: true, outputPath: outPath });
              setLogs(l => [...l, { t: now(), s: 4, msg: `Done! Output: ${outPath}` }]);
              // mark episode complete in the project + library
              setProjects(prev => prev.map(p => p.id === job.projectId ? {
                ...p, episodes: p.episodes.map(e => e.id === job.episodeId ? {
                  ...e, status: 'complete', size: 214, date: new Date().toLocaleString([], { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' }), outputPath: outPath
                } : e)
              } : p));
              pushToast({ kind: 'success', title: 'Dub exported', msg: outPath });
              return s;
            }
            setLogs(l => [...l, { t: now(), s: 4, msg: `→ ${stages[s + 1].name}` }]);
            return s + 1;
          });
          return 0;
        }
        return n;
      });
      if (Math.random() < 0.6) setLogs(l => [...l, { t: now(), s: 4, msg: (lines[stage] || ['…'])[Math.floor(Math.random() * (lines[stage]||['…']).length)] }]);
    }, 300);
    return () => clearInterval(t);
  }, [running, stage]); // eslint-disable-line

  return (
    <>
      <div className="panel" style={{ marginBottom: 20 }}>
        <div className="panel-title">Pre-Flight Checklist</div>
        <div className="checklist">
          {Object.entries(checks).map(([k, v]) => (
            <div key={k} className={'checkitem' + (v ? ' ok' : '')}>
              <div className="checkitem-label">{k}</div>
              <div className="checkitem-status">{v ? 'READY' : 'MISSING'}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="panel">
        <div className="stage-head">
          <div className="panel-title">Stage 4 · Sync &amp; Mux → Export</div>
          <button className="btn btn-primary btn-small" onClick={run} disabled={!allOk || running}>{running ? 'Exporting…' : job.exported ? 'Re-Export' : 'Export Final Dub'}</button>
        </div>
        <div className="stages">
          {stages.map((s, i) => {
            const cls = !running && !job.exported ? 'idle' : (i < stage ? 'done' : i === stage && running ? 'run' : (job.exported ? 'done' : 'idle'));
            const pct = !running && !job.exported ? 0 : (i < stage ? 100 : (i === stage ? Math.round(prog) : (job.exported ? 100 : 0)));
            return (
              <div key={s.name} className={'stage-card ' + cls}>
                <div className="stage-num">Step {i + 1}</div>
                <div className="stage-name">{s.name}</div>
                <div className="stage-bar"><div className="stage-bar-fill" style={{ width: pct + '%' }}></div></div>
              </div>
            );
          })}
        </div>

        <div className="log">
          {logs.length === 0 ? <div style={{ color: 'var(--ink-3)' }}>Waiting to export…</div> :
            logs.slice(-80).map((l, k) => <div key={k}><span className="ts">[{l.t}]</span> <span className="stage4">[Sync]</span> {l.msg}</div>)}
        </div>

        {job.exported && (
          <div style={{ marginTop: 14, padding: '14px 16px', background: 'rgba(74,222,128,0.06)', border: '1px solid rgba(74,222,128,0.3)', borderRadius: 4, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontSize: 13, color: '#fff', fontWeight: 500 }}>Dub complete ” added to Library</div>
              <div style={{ fontSize: 11.5, color: 'var(--ink-2)', fontFamily: 'JetBrains Mono, monospace', marginTop: 2 }}>{job.outputPath}</div>
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn btn-small"><Ico.folder width="13" height="13" style={{ marginRight: 6, verticalAlign: -2 }}/>Open Folder</button>
              <button className="btn btn-primary btn-small"><Ico.download width="13" height="13" style={{ marginRight: 6, verticalAlign: -2 }}/>Download</button>
            </div>
          </div>
        )}
      </div>
    </>
  );
}

/* =============================================================
   CHARACTER VAULT ” global roster vs show voices + voice test
============================================================= */
const QUALITY_CYCLE = { good: 'okay', okay: 'poor', poor: 'good' };
const QUALITY_LABEL = { good: '★ Good', okay: '◐ Okay', poor: '✗ Poor' };
const QUALITY_COLOR = { good: 'var(--good)', okay: 'var(--gold)', poor: 'var(--bad)' };

function CharCard({ c, characters, playingId, testId, onFav, onRemove, onQuality, onSubFor, onPlay, onTest, pushToast }) {
  const [regenState, setRegenState] = useState('idle'); // idle | running | done | error
  const [editSub, setEditSub] = useState(false);
  const isSpeaker = /^SPEAKER_\d+$/i.test(c.id);
  const quality = c.quality || 'okay';

  const doRegen = () => {
    if (!c.samplePath) { pushToast({ kind: 'error', title: 'No sample path', msg: 'Original sample was not saved with this clone.' }); return; }
    setRegenState('running');
    fetch('/api/regen_speaker', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ show_slug: c.showSlug, speaker_id: c.id }),
    }).then(r => r.json()).then(() => {
      const poll = setInterval(() => {
        fetch(`/api/regen_status?show_slug=${encodeURIComponent(c.showSlug)}&speaker_id=${encodeURIComponent(c.id)}`)
          .then(r => r.json()).then(res => {
            if (res.status === 'done') {
              clearInterval(poll);
              setRegenState('done');
              pushToast({ kind: 'success', title: `${c.id} regen complete`, msg: 'New avatar_monologue.wav saved.' });
              setTimeout(() => setRegenState('idle'), 4000);
            } else if (res.status === 'error') {
              clearInterval(poll);
              setRegenState('error');
              pushToast({ kind: 'error', title: 'Regen failed', msg: res.error || '' });
            }
          }).catch(() => {});
      }, 3000);
    }).catch(e => { setRegenState('error'); pushToast({ kind: 'error', title: 'Regen failed', msg: String(e) }); });
  };

  const subOptions = characters.filter(x => x.id !== c.id);
  const subLabels  = (c.substituteFor || []).map(id => characters.find(x => x.id === id)?.name || id).join(', ');

  return (
    <div className="char-card">
      <button className={'char-fav' + (c.fav ? ' on' : '')} onClick={onFav} title="Favorite">
        {c.fav ? <Ico.star width="15" height="15"/> : <Ico.starO width="15" height="15"/>}
      </button>
      <button className="char-remove" onClick={onRemove} title="Remove"><Ico.close width="12" height="12" /></button>

      {/* Quality badge */}
      <button onClick={onQuality} title="Click to cycle quality" style={{ position: 'absolute', top: 10, left: 10, background: 'none', border: 'none', cursor: 'pointer', fontSize: 10, color: QUALITY_COLOR[quality], fontFamily: 'JetBrains Mono, monospace', padding: 0 }}>
        {QUALITY_LABEL[quality]}
      </button>

      <div className="char-avatar">{c.name.slice(0, 2).toUpperCase()}</div>
      <div className="char-name">{c.name}</div>
      <div className="char-show">{c.domain === 'global' ? 'Global Roster' : c.show}</div>
      <div className="char-file">{c.file}</div>
      <div className="usage-pill">Used in <b>{c.usage || 0}</b> dub{(c.usage || 0) === 1 ? '' : 's'}</div>

      <div className={'wave-strip' + (playingId === c.id ? ' playing' : '')} onClick={onPlay} style={{ cursor: 'pointer' }}>
        {waveHeights(c.id.length, 38).map((h, k) => <span key={k} style={{ height: h + '%' }}></span>)}
      </div>

      {c.notes && <div className="help" style={{ textAlign: 'left', marginTop: 10, fontStyle: 'italic' }}>"{c.notes}"</div>}

      {/* Can substitute for */}
      <div style={{ marginTop: 10 }}>
        <div style={{ fontSize: 10, color: 'var(--ink-3)', marginBottom: 4, textTransform: 'uppercase', letterSpacing: '0.06em' }}>Can sub for</div>
        {!editSub ? (
          <div style={{ fontSize: 11, color: subLabels ? 'var(--ink-2)' : 'var(--ink-3)', fontStyle: subLabels ? 'normal' : 'italic', cursor: 'pointer' }} onClick={() => setEditSub(true)}>
            {subLabels || 'None ” click to assign'}
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            {subOptions.map(opt => (
              <label key={opt.id} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 11, cursor: 'pointer' }}>
                <input type="checkbox"
                  checked={(c.substituteFor || []).includes(opt.id)}
                  onChange={(e) => {
                    const cur = c.substituteFor || [];
                    onSubFor(e.target.checked ? [...cur, opt.id] : cur.filter(x => x !== opt.id));
                  }}
                />
                <span style={{ color: QUALITY_COLOR[opt.quality || 'okay'] }}>{QUALITY_LABEL[opt.quality || 'okay']}</span>
                {opt.name}
              </label>
            ))}
            <button className="btn btn-small btn-ghost" style={{ marginTop: 4, alignSelf: 'flex-start' }} onClick={() => setEditSub(false)}>Done</button>
          </div>
        )}
      </div>

      <div className="char-actions" style={{ marginTop: 12 }}>
        <button className="btn btn-small" onClick={onPlay}>{playingId === c.id ? 'â¹ Stop' : 'â–¶ Preview'}</button>
        <button className="btn btn-small btn-ghost" onClick={onTest}>🎬 Voice Test</button>
        {isSpeaker && c.domain === 'show' && (
          <button className="btn btn-small btn-ghost" onClick={doRegen} disabled={regenState === 'running'} style={{ color: regenState === 'done' ? 'var(--good)' : regenState === 'error' ? 'var(--bad)' : undefined }}>
            {regenState === 'running' ? '⏳ Regen…' : regenState === 'done' ? '✓ Done' : regenState === 'error' ? '✗ Failed' : 'â†º Regen'}
          </button>
        )}
      </div>
      {testId === c.id && <VoiceTest character={c} pushToast={pushToast} />}
    </div>
  );
}

function CharacterVault({ characters, setCharacters, pushToast }) {
  const [domain, setDomain] = useState('global'); // 'global' | 'show'
  const [showSlug, setShowSlug] = useState(SMOKING_SLUG);
  const [q, setQ] = useState('');
  const [favOnly, setFavOnly] = useState(false);
  const [adding, setAdding] = useState(false);
  const [name, setName] = useState('');
  const [show, setShow] = useState('');
  const [notes, setNotes] = useState('');
  const [file, setFile] = useState(null);
  const [testId, setTestId] = useState(null);
  const [playingId, setPlayingId] = useState(null);
  const fileRef = useRef(null);

  const showSlugs = useMemo(() => Array.from(new Set(characters.filter(c => c.domain === 'show').map(c => c.showSlug))), [characters]);
  const showName = (slug) => characters.find(c => c.showSlug === slug)?.show || slug;

  // Auto-switch showSlug when new show chars load and current slug has no chars
  useEffect(() => {
    if (domain === 'show' && showSlugs.length && !showSlugs.includes(showSlug)) {
      setShowSlug(showSlugs[0]);
    }
  }, [showSlugs]);

  const list = useMemo(() => characters.filter(c => {
    if (domain === 'global' && c.domain !== 'global') return false;
    if (domain === 'show' && (c.domain !== 'show' || c.showSlug !== showSlug)) return false;
    if (favOnly && !c.fav) return false;
    if (q && !c.name.toLowerCase().includes(q.toLowerCase())) return false;
    return true;
  }), [characters, domain, showSlug, favOnly, q]);

  const toggleFav     = (id) => setCharacters(cs => cs.map(c => c.id === id ? { ...c, fav: !c.fav } : c));
  const cycleQuality  = (id) => setCharacters(cs => cs.map(c => c.id === id ? { ...c, quality: QUALITY_CYCLE[c.quality || 'okay'] } : c));
  const setSubFor     = (id, val) => setCharacters(cs => cs.map(c => c.id === id ? { ...c, substituteFor: val } : c));
  const remove        = (id) => { const c = characters.find(x => x.id === id); setCharacters(cs => cs.filter(x => x.id !== id)); if (c) pushToast({ kind: 'info', title: 'Removed from vault', msg: c.name }); };

  const previewAudioRef = React.useRef(null);
  const playPreview = (c) => {
    if (previewAudioRef.current) { previewAudioRef.current.pause(); previewAudioRef.current = null; }
    if (playingId === c.id) { setPlayingId(null); return; }
    if (!c.file) return;
    const a = new Audio('/' + c.file);
    previewAudioRef.current = a;
    a.play().catch(() => {});
    a.onended = () => setPlayingId(null);
    setPlayingId(c.id);
  };

  const add = () => {
    if (!name.trim()) { pushToast({ kind: 'error', title: 'Name required' }); return; }
    if (!file) { pushToast({ kind: 'error', title: 'Avatar monologue clip required' }); return; }
    const id = slugify(name);
    const base = domain === 'global'
      ? `characters/global_roster/${id}/avatar_monologue.wav`
      : `characters/shows/${showSlug}/${id}/avatar_monologue.wav`;
    setCharacters(cs => [...cs, {
      id: id + '_' + Date.now(), name: name.trim(), domain, show: domain === 'global' ? 'Global Roster' : showName(showSlug),
      showSlug: domain === 'show' ? showSlug : undefined, file: base, notes: notes.trim(), fav: false, usage: 0,
    }]);
    pushToast({ kind: 'success', title: 'Added to vault', msg: `${name} → ${base}` });
    setName(''); setShow(''); setNotes(''); setFile(null); setAdding(false);
    if (fileRef.current) fileRef.current.value = '';
  };

  return (
    <>
      <div className="page-head">
        <div>
          <div className="eyebrow">Voice Library</div>
          <h2 className="page-title">Character Vault</h2>
          <div className="page-sub"><b style={{color:'var(--ink-2)'}}>Global Roster</b> holds general voices (actors not in any show). When you dub a show, cloned character voices are saved per show + character so you can reuse them on future episodes.</div>
        </div>
        <span className="pill">{characters.length} voices</span>
      </div>

      <div className="panel" style={{ marginBottom: 20 }}>
        <div style={{ display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap' }}>
          <div className="seg">
            <button className={domain === 'global' ? 'on' : ''} onClick={() => setDomain('global')}>Global Roster</button>
            <button className={domain === 'show' ? 'on' : ''} onClick={() => setDomain('show')}>By Show</button>
          </div>
          {domain === 'show' && (
            <select className="select" value={showSlug} onChange={(e) => setShowSlug(e.target.value)} style={{ width: 280 }}>
              {showSlugs.map(s => <option key={s} value={s}>{showName(s)}</option>)}
            </select>
          )}
          <div style={{ position: 'relative', flex: 1, minWidth: 180 }}>
            <Ico.search width="15" height="15" style={{ position: 'absolute', left: 12, top: 11, color: 'var(--ink-3)' }} />
            <input className="input" value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search voices…" style={{ paddingLeft: 34 }} />
          </div>
          <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12, color: 'var(--ink-2)' }}>
            <div className={'toggle' + (favOnly ? ' on' : '')} onClick={() => setFavOnly(f => !f)}></div>Favorites
          </label>
          <button className="btn btn-primary btn-small" onClick={() => setAdding(a => !a)}><Ico.plus width="13" height="13" style={{ marginRight: 5, verticalAlign: -2 }}/>Add Voice</button>
        </div>

        {adding && (
          <div style={{ background: 'var(--bg-1)', border: '1px solid var(--line-2)', borderRadius: 6, padding: 18, marginTop: 16 }}>
            <div className="help" style={{ marginTop: 0, marginBottom: 12 }}>Adding to <b style={{ color: 'var(--gold)' }}>{domain === 'global' ? 'Global Roster' : showName(showSlug)}</b>. The reference clip is stored as the standardized <code style={{color:'var(--gold)',fontFamily:'JetBrains Mono,monospace'}}>avatar_monologue.wav</code>.</div>
            <div className="grid-2" style={{ marginBottom: 14 }}>
              <div><div className="label">Voice / Character Name</div><input className="input" value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Sasaki" /></div>
              <div><div className="label">Notes (optional)</div><input className="input" value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="Tone, register, archetype…" /></div>
            </div>
            <label className="dropzone" style={{ padding: '24px', marginBottom: 14, display: 'block' }} onClick={(e) => { if (e.target.tagName !== 'INPUT') fileRef.current?.click(); }}>
              <input ref={fileRef} type="file" accept="audio/*" hidden onChange={(e) => setFile(e.target.files[0])} />
              <div className="glyph"><Ico.upload width="18" height="18"/></div>
              {file ? <><div className="heading" style={{ fontSize: 15 }}>{file.name}</div><div className="sub">{(file.size/1000).toFixed(1)} KB · click to replace</div></>
                    : <><div className="heading" style={{ fontSize: 15 }}>Drop reference clip</div><div className="sub">10s clean dialogue · saved as avatar_monologue.wav</div></>}
            </label>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn btn-primary btn-small" onClick={add}>Add to Vault</button>
              <button className="btn btn-ghost btn-small" onClick={() => setAdding(false)}>Cancel</button>
            </div>
          </div>
        )}
      </div>

      {list.length === 0 ? (
        <div className="empty">No voices here yet. Add one with the button above.</div>
      ) : (
        <div className="grid-3">
          {list.map(c => (
            <CharCard key={c.id} c={c}
              characters={characters}
              playingId={playingId} testId={testId}
              onFav={() => toggleFav(c.id)}
              onRemove={() => remove(c.id)}
              onQuality={() => cycleQuality(c.id)}
              onSubFor={(val) => setSubFor(c.id, val)}
              onPlay={() => playPreview(c)}
              onTest={() => setTestId(testId === c.id ? null : c.id)}
              pushToast={pushToast}
            />
          ))}
        </div>
      )}
    </>
  );
}

/* Avatar monologue voice test ” runs real IndexTTS synthesis */
function VoiceTest({ character, pushToast }) {
  const [state, setState] = useState('idle'); // idle | gen | ready | play | error
  const [outPath, setOutPath] = useState(null);
  const audioRef = React.useRef(null);

  const run = () => {
    setState('gen');
    pushToast({ kind: 'info', title: 'IndexTTS running', msg: `${character.name} reading the avatar monologue…` });
    fetch('/api/voice_test', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ref: character.file, char_id: character.id }),
    })
      .then(r => r.json())
      .then(res => {
        if (res.error) { setState('error'); pushToast({ kind: 'error', title: 'Voice test failed', msg: res.error }); return; }
        const path = res.out;
        // Poll until the file appears (IndexTTS takes 10-60s)
        const poll = setInterval(() => {
          fetch('/' + path, { method: 'HEAD' }).then(r => {
            if (r.ok) {
              clearInterval(poll);
              setOutPath(path);
              setState('ready');
              pushToast({ kind: 'success', title: 'Test ready', msg: `${character.name}_avatar_test.wav` });
            }
          }).catch(() => {});
        }, 3000);
      })
      .catch(e => { setState('error'); pushToast({ kind: 'error', title: 'Voice test error', msg: String(e) }); });
  };

  const play = () => {
    if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
    if (state === 'play') { setState('ready'); return; }
    const a = new Audio('/' + outPath);
    audioRef.current = a;
    setState('play');
    a.play().catch(() => {});
    a.onended = () => setState('ready');
  };
  return (
    <div className="vtest" style={{ textAlign: 'left' }}>
      <div className="label" style={{ marginBottom: 8 }}>Avatar Monologue · standardized test</div>
      <div className="mono-para">{AVATAR_MONOLOGUE}</div>
      {(state === 'idle' || state === 'error') && <button className="btn btn-small btn-primary" style={{ marginTop: 12 }} onClick={run}>{state === 'error' ? 'â†º Retry' : 'Generate Test Read'}</button>}
      {state === 'error' && <div className="help" style={{ marginTop: 6, color: 'var(--bad)' }}>IndexTTS failed ” check server console.</div>}
      {state === 'gen' && <div className="help" style={{ marginTop: 12 }}>⏳ Synthesizing… this takes 15‘60s depending on GPU</div>}
      {(state === 'ready' || state === 'play') && (
        <>
          <div className={'wave-strip' + (state === 'play' ? ' playing' : '')} style={{ marginTop: 12, height: 40 }}>{waveHeights(character.id.length + 5, 56).map((h,k)=><span key={k} style={{height:h+'%'}}></span>)}</div>
          <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
            <button className="btn btn-small" onClick={play}>{state === 'play' ? 'â¹ Playing…' : 'â–¶ Play'}</button>
            <button className="btn btn-small btn-ghost" onClick={run}>Regenerate</button>
          </div>
        </>
      )}
    </div>
  );
}

/* =============================================================
   LIBRARY ” poster/episode cards grouped by show
============================================================= */
function Library({ projects, setProjects, onPlay, pushToast, onGoStudio }) {
  const [q, setQ] = useState('');
  const posterRef = useRef(null);
  const [posterTarget, setPosterTarget] = useState(null);

  const setPoster = (e) => {
    const f = e.target.files?.[0]; if (!f || !posterTarget) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const { projId, epId } = posterTarget;
      setProjects(prev => prev.map(p => p.id === projId ? { ...p, episodes: p.episodes.map(ep => ep.id === epId ? { ...ep, thumb: ev.target.result } : ep) } : p));
      pushToast({ kind: 'success', title: 'Poster updated' });
    };
    reader.readAsDataURL(f); e.target.value = '';
  };

  const filtered = projects
    .map(p => ({ ...p, eps: p.episodes.filter(e => !q || (p.title + ' ' + e.label + ' ' + e.name).toLowerCase().includes(q.toLowerCase())) }))
    .filter(p => p.eps.length);

  const remove = (projId, epId) => {
    setProjects(prev => prev.map(p => p.id === projId ? { ...p, episodes: p.episodes.map(e => e.id === epId ? { ...e, status: 'empty', thumb: null, outputPath: null } : e) } : p));
    pushToast({ kind: 'info', title: 'Removed from library' });
  };

  return (
    <>
      <input ref={posterRef} type="file" accept="image/*" hidden onChange={setPoster} />
      <div className="page-head">
        <div>
          <div className="eyebrow">Archive</div>
          <h2 className="page-title">Library</h2>
          <div className="page-sub">Every show is a shelf of episode posters. Completed dubs land in <code style={{color:'var(--gold)',fontFamily:'JetBrains Mono, monospace'}}>workspace/5_outputs/</code>; empty slots are episodes waiting to be dubbed.</div>
        </div>
        <div style={{ position: 'relative' }}>
          <Ico.search width="15" height="15" style={{ position: 'absolute', left: 12, top: 11, color: 'var(--ink-3)' }} />
          <input className="input" placeholder="Search the archive…" value={q} onChange={(e) => setQ(e.target.value)} style={{ width: 280, paddingLeft: 34 }} />
        </div>
      </div>

      {filtered.length === 0 ? (
        <div className="empty">No episodes match “{q}”.</div>
      ) : filtered.map(p => (
        <div key={p.id} className="show-section">
          <div className="show-section-head">
            <h3>{p.title}</h3>
            <span className="meta">{p.format} · {p.year || '”'} · {p.genres.join(', ') || 'No genres'} · {p.episodes.filter(e=>e.status==='complete').length}/{p.episodes.length} dubbed</span>
          </div>
          <div className="grid-3">
            {p.eps.map(ep => ep.status === 'complete' ? (
              <div key={ep.id} className="ep-card done">
                <div className={'lib-thumb' + (ep.thumb ? ' has-img' : '')} data-letter={p.title[0]} style={ep.thumb ? { backgroundImage: `url(${ep.thumb})` } : null} onClick={() => onPlay({ title: `${p.title} ” ${ep.label}`, size: ep.size, date: ep.date, genres: p.genres })}>
                  <div className="play-overlay"><div className="play-icon"><Ico.play width="20" height="20" style={{ marginLeft: 3 }} /></div></div>
                  <div className="thumb-tags"><span className="thumb-tag">{ep.label}</span></div>
                  <div className="lib-card-actions">
                    <button className="icon-btn" onClick={(e) => { e.stopPropagation(); setPosterTarget({ projId: p.id, epId: ep.id }); posterRef.current?.click(); }} title="Set poster"><Ico.image width="14" height="14"/></button>
                    <button className="icon-btn" onClick={(e) => { e.stopPropagation(); remove(p.id, ep.id); }} title="Remove"><Ico.trash width="14" height="14"/></button>
                  </div>
                </div>
                <div className="ep-status-bar complete"><Ico.check width="13" height="13"/> English Dub Complete</div>
                <div className="lib-meta" style={{ paddingBottom: 8 }}>
                  <div className="lib-title">{ep.name}</div>
                  <div className="lib-sub"><span>{fmtSize(ep.size || 0)}</span><span>·</span><span>{ep.date}</span></div>
                </div>
                <div className="ep-actions">
                  <button className="btn btn-small" style={{ flex: 1 }} onClick={() => onPlay({ title: `${p.title} ” ${ep.label}`, size: ep.size, date: ep.date, genres: p.genres })}><Ico.play width="11" height="11" style={{ marginRight: 5, verticalAlign: -1 }}/>Preview</button>
                  <button className="btn btn-small btn-ghost" title="Open folder"><Ico.folder width="13" height="13"/></button>
                  <button className="btn btn-small btn-ghost" title="Open video"><Ico.film width="13" height="13"/></button>
                </div>
              </div>
            ) : (
              <div key={ep.id} className="ep-card empty">
                <div className="add-card" style={{ aspectRatio: '16/9', minHeight: 0 }} onClick={onGoStudio}>
                  <Ico.plus width="22" height="22" />
                  <div style={{ fontSize: 12.5, letterSpacing: '0.06em' }}>{ep.label} ” not dubbed</div>
                  <div style={{ fontSize: 11, color: 'var(--ink-3)' }}>Dub it in the Studio</div>
                </div>
                <div className="lib-meta" style={{ paddingTop: 12 }}>
                  <div className="lib-title" style={{ color: 'var(--ink-2)' }}>{ep.name}</div>
                  <div className="lib-sub"><span>Empty slot</span></div>
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </>
  );
}

/* =============================================================
   SETTINGS ” Ollama / Whisper / paths only
============================================================= */
function Settings({ config, setConfig, pushToast, sysCheck }) {
  const [revealH, setRevealH] = useState(false);
  const upd = (patch) => setConfig(c => ({ ...c, ...patch }));
  const save = () => pushToast({ kind: 'success', title: 'Settings saved', msg: 'config.json written' });

  const tools = [
    ['FFmpeg', sysCheck.ffmpeg], ['Demucs', sysCheck.demucs], ['faster-whisper', sysCheck.whisper],
    ['pyannote', true], ['Ollama', sysCheck.ollama], ['IndexTTS-2', sysCheck.indextts], ['librosa', true],
  ];

  return (
    <>
      <div className="page-head">
        <div>
          <div className="eyebrow">Configuration</div>
          <h2 className="page-title">Settings</h2>
          <div className="page-sub">Saved to <code style={{color:'var(--gold)',fontFamily:'JetBrains Mono, monospace'}}>config.json</code>. Everything runs locally ” no cloud TTS, no API spaces.</div>
        </div>
      </div>

      <div className="grid-2" style={{ marginBottom: 20 }}>
        <div className="panel">
          <div className="panel-title">Ollama (Director LLM)</div>
          <div className="field">
            <div className="label">Ollama URL</div>
            <input className="input" value={config.ollamaUrl} onChange={(e) => upd({ ollamaUrl: e.target.value })} />
            <div className="help">Default http://localhost:11434 ” must be running before dubbing.</div>
          </div>
          <div className="field" style={{ marginBottom: 0 }}>
            <div className="label">Model</div>
            <input className="input" value={config.ollamaModel} onChange={(e) => upd({ ollamaModel: e.target.value })} />
            <div className="help">e.g. llama3.1:8b ” <code style={{color:'var(--gold)',fontFamily:'JetBrains Mono,monospace'}}>ollama pull llama3.1:8b</code></div>
          </div>
        </div>

        <div className="panel">
          <div className="panel-title">Transcription &amp; Output</div>
          <div className="field">
            <div className="label">Whisper Model</div>
            <input className="input" value={config.whisperModel} onChange={(e) => upd({ whisperModel: e.target.value })} placeholder="large-v3, medium, small" />
            <div className="help">Larger = more accurate, slower. large-v3 recommended.</div>
          </div>
          <div className="field" style={{ marginBottom: 0 }}>
            <div className="label">Output Directory</div>
            <input className="input" value={config.outputDir} onChange={(e) => upd({ outputDir: e.target.value })} />
          </div>
        </div>
      </div>

      <div className="grid-2" style={{ marginBottom: 20 }}>
        <div className="panel">
          <div className="panel-title">IndexTTS-2 (Actor)</div>
          <div className="field">
            <div className="label">IndexTTS2 Directory</div>
            <input className="input" value={config.indexttsDir} onChange={(e) => upd({ indexttsDir: e.target.value })} />
            <div className="help">Holds <code style={{color:'var(--gold)',fontFamily:'JetBrains Mono,monospace'}}>checkpoints/config.yaml</code></div>
          </div>
          <div className="field" style={{ marginBottom: 0 }}>
            <div className="label">Conda Environment</div>
            <input className="input" value={config.condaEnv} onChange={(e) => upd({ condaEnv: e.target.value })} />
            <div className="help">Actor runs via <code style={{color:'var(--gold)',fontFamily:'JetBrains Mono,monospace'}}>conda run -n {config.condaEnv}</code></div>
          </div>
        </div>

        <div className="panel">
          <div className="panel-title">Diarization Token</div>
          <div className="field" style={{ marginBottom: 0 }}>
            <div className="label">Hugging Face Token <span style={{ color: 'var(--ink-3)', textTransform: 'none', letterSpacing: 0 }}>· pyannote only</span></div>
            <div className="api-row">
              <input className="input" type={revealH ? 'text' : 'password'} value={config.hfToken} onChange={(e) => upd({ hfToken: e.target.value })} />
              <button className="reveal-btn" onClick={() => setRevealH(r => !r)}>{revealH ? 'Hide' : 'Reveal'}</button>
            </div>
            <div className="help">Used only to download the pyannote speaker-diarization model. Leave blank to put every line on SPEAKER_00.</div>
          </div>
        </div>
      </div>

      <div className="panel" style={{ marginBottom: 20 }}>
        <div className="panel-title">Full System Status</div>
        <div className="checklist">
          {tools.map(([name, ok]) => (
            <div key={name} className={'checkitem' + (ok ? ' ok' : '')}>
              <div className="checkitem-label">{name}</div>
              <div className="checkitem-status">{ok ? 'READY' : 'MISSING'}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10 }}>
        <button className="btn btn-ghost">Reset</button>
        <button className="btn btn-primary" onClick={save}>Save Settings</button>
      </div>
    </>
  );
}

/* =============================================================
   VIDEO MODAL + TOASTS
============================================================= */
function VideoModal({ video, onClose }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);
  const src = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4';
  return (
    <div className="modal-veil" onClick={onClose}>
      <div className="modal-head" onClick={(e) => e.stopPropagation()}>
        <h3 className="modal-title">{video.title}</h3>
        <button className="modal-close" onClick={onClose}><Ico.close width="16" height="16" /></button>
      </div>
      <video className="modal-video" controls autoPlay src={src} onClick={(e) => e.stopPropagation()}></video>
      <div style={{ width: 'min(1100px, 90vw)', display: 'flex', gap: 16, marginTop: 12, color: 'var(--ink-3)', fontSize: 11.5, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.06em' }}>
        {video.size != null && <><span>{fmtSize(video.size)}</span><span>·</span></>}
        {video.date && <><span>{video.date}</span><span>·</span></>}
        <span style={{ color: 'var(--gold)' }}>dubbed · EN</span>
        {video.genres && video.genres.length > 0 && <><span>·</span><span>{video.genres.join(' · ')}</span></>}
      </div>
    </div>
  );
}

function Toasts({ toasts, onDismiss }) {
  return (
    <div className="toasts">
      {toasts.map(t => {
        const I = t.kind === 'success' ? Ico.check : t.kind === 'error' ? Ico.alert : Ico.info;
        const color = t.kind === 'success' ? 'var(--good)' : t.kind === 'error' ? 'var(--bad)' : 'var(--info)';
        return (
          <div key={t.id} className={'toast ' + t.kind} onClick={() => onDismiss(t.id)}>
            <I className="toast-ico" style={{ color }} />
            <div style={{ flex: 1 }}>
              <div className="toast-title">{t.title}</div>
              {t.msg && <div className="toast-msg">{t.msg}</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
